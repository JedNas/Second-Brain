<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Second Brain</title>
<link rel="icon" type="image/svg+xml" href="logo.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SECOND BRAIN — design system
   ============================================================ */
:root{
  --bg: #F8F5FC;
  --bg-sidebar: #F0EAFA;
  --bg-elevated: #FFFFFF;
  --separator: #E4DFF3;
  --text: #201C33;
  --text-secondary: #6E6485;
  --text-tertiary: #A79BC4;

  --accent: #D4537E;
  --accent-hover: #B23F65;
  --accent-soft: #FBEAF0;
  --blue: #38A8F0;
  --blue-soft: #E3F2FD;

  --danger: #E5484D;
  --danger-soft: #FBE7E7;
  --warning: #E8912D;
  --warning-soft: #FBEFDD;
  --low: #2FC088;
  --low-soft: #E1F6ED;

  --radius-sm: 12px;
  --radius: 16px;
  --radius-lg: 24px;

  --overlay-1: rgba(36,27,61,0.04);
  --overlay-2: rgba(36,27,61,0.07);
  --overlay-3: rgba(36,27,61,0.11);
  --overlay-4: rgba(36,27,61,0.16);
  --overlay-5: rgba(36,27,61,0.24);

  --shadow-sm: 0 1px 2px rgba(36,27,61,0.06), 0 1px 1px rgba(36,27,61,0.04);
  --shadow-md: 0 4px 14px rgba(36,27,61,0.09), 0 2px 4px rgba(36,27,61,0.06);
  --shadow-lg: 0 12px 32px rgba(36,27,61,0.14), 0 4px 10px rgba(36,27,61,0.08);

  --fs-2xs:11px; --fs-xs:12px; --fs-sm:13px; --fs-base:14px;
  --fs-md:15px; --fs-lg:17px; --fs-xl:21px; --fs-2xl:30px;

  --sidebar-w: 256px;
  --accent-rgb: 212,83,126;
}

html[data-theme="dark"]{
  --bg: #141218;
  --bg-sidebar: #141218;
  --bg-elevated: #1B1820;
  --separator: #2A2732;
  --text: #F3EFFC;
  --text-secondary: #B8AFDE;
  --text-tertiary: #756E8C;

  --accent: #F583B4;
  --accent-hover: #FF9EC6;
  --accent-soft: rgba(245,131,180,0.16);
  --blue: #5EBBFB;
  --blue-soft: rgba(94,187,251,0.14);

  --danger: #F1696D;
  --danger-soft: rgba(241,105,109,0.14);
  --warning: #F0A44C;
  --warning-soft: rgba(240,164,76,0.14);
  --low: #4CD3A0;
  --low-soft: rgba(76,211,160,0.14);

  --overlay-1: rgba(230,220,255,0.05);
  --overlay-2: rgba(230,220,255,0.08);
  --overlay-3: rgba(230,220,255,0.12);
  --overlay-4: rgba(230,220,255,0.18);
  --overlay-5: rgba(230,220,255,0.26);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.25), 0 1px 1px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.25);
  --shadow-lg: 0 16px 40px rgba(0,0,0,0.5), 0 6px 14px rgba(0,0,0,0.3);
  --accent-rgb: 245,131,180;
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  font-family:'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:linear-gradient(135deg, #E7D9F7 0%, #F3EAFB 35%, #FBF6EC 70%, #FDEFF6 100%);
  color:var(--text);
  font-size:var(--fs-base);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding:18px;
}
html[data-theme="dark"] body{
  background:
    radial-gradient(ellipse 900px 600px at 15% 0%, rgba(139,107,242,0.16), transparent 60%),
    radial-gradient(ellipse 900px 600px at 100% 100%, rgba(245,131,180,0.10), transparent 60%),
    #0B0A10;
}
h1,h2,h3,h4{
  font-weight:700;
  letter-spacing:-0.01em;
  line-height:1.15;
  margin:0;
}
button, input, textarea, select{ font-family:inherit; font-size:inherit; color:inherit; }
button{ cursor:pointer; }
a{ color:var(--accent); }
::selection{ background:var(--accent-soft); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
}

/* ---------- App layout ---------- */
#appShell{
  display:flex; flex-direction:column; height:calc(100vh - 36px);
  background:var(--bg-elevated); border-radius:28px; overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.sb-topheader{
  flex-shrink:0; display:flex; align-items:center; gap:20px;
  padding:14px 24px; border-bottom:1px solid var(--separator); background:var(--bg-elevated);
}
#app{ display:flex; flex:1; min-height:0; }

.sb-sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--bg-sidebar);
  border-right:1px solid var(--separator);
  display:flex;
  flex-direction:column;
  padding:24px 16px;
  height:100%;
  overflow-y:auto;
}
.sb-header-brand{
  display:flex; align-items:center; gap:8px; flex-shrink:0;
  font-size:var(--fs-lg); font-weight:700;
}
.sb-header-search{ flex:0 1 360px; min-width:140px; margin-bottom:0 !important; }
.sb-header-right{ display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0; }
.sb-profile-chip{
  display:flex; align-items:center; gap:9px; flex-shrink:0;
  border:1px solid var(--separator); background:var(--bg-elevated); box-shadow:var(--shadow-sm);
  border-radius:999px; padding:5px 14px 5px 5px; cursor:pointer;
}
.sb-profile-chip:hover{ background:var(--overlay-1); }
.sb-profile-avatar{
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent) 0%, #8B6BF2 100%); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:var(--fs-2xs); font-weight:700;
}
.sb-profile-text{ display:flex; flex-direction:column; align-items:flex-start; line-height:1.2; }
.sb-profile-name{ font-size:var(--fs-sm); font-weight:600; color:var(--text); }
.sb-profile-sub{ font-size:var(--fs-2xs); color:var(--text-tertiary); }
.sb-profile-chevron{ color:var(--text-tertiary); font-size:12px; margin-left:2px; }

.sb-brand{
  display:flex; align-items:center; justify-content:space-between;
  padding:2px 6px 18px 6px;
}
.sb-brand-name{
  display:flex; align-items:center; gap:8px;
  font-size:var(--fs-lg); font-weight:700;
}
.sb-brand-icon{
  width:34px; height:34px; display:block; flex-shrink:0;
}
.sb-icon-btn{
  width:30px; height:30px; border-radius:50%;
  border:none; background:transparent; display:flex; align-items:center; justify-content:center;
  color:var(--text-secondary); font-size:15px;
  transition:background 150ms ease, color 150ms ease;
}
.sb-icon-btn:hover{ background:var(--overlay-2); color:var(--text); }

.sb-nav{ display:flex; flex-direction:column; gap:2px; margin-bottom:14px; }
.sb-nav-item, .sb-folder-row{
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:12px;
  border:none; background:transparent; width:100%; text-align:left;
  color:var(--text-secondary); font-size:var(--fs-sm); font-weight:500;
  transition:background 150ms ease, color 150ms ease;
  cursor:pointer; position:relative;
}
.sb-nav-item:hover, .sb-folder-row:hover{ background:var(--overlay-2); color:var(--text); }
.sb-nav-item.active{ background:var(--accent-soft); color:var(--accent); font-weight:600; }
.sb-nav-item .sb-ico{ font-size:15px; width:18px; text-align:center; }
.sb-nav-badge{
  margin-left:auto; background:var(--danger); color:#fff; font-size:var(--fs-2xs);
  font-weight:700; border-radius:999px; padding:1px 6px; min-width:16px; text-align:center;
}
.sb-nav-count{
  margin-left:auto; color:var(--text-tertiary); font-size:var(--fs-2xs); font-weight:600;
}

.sb-sep{ height:1px; background:var(--separator); margin:8px 4px 10px; }

.sb-folder-tree{ display:flex; flex-direction:column; gap:1px; flex:1; overflow-y:auto; }
.sb-folder-row{ padding-left:10px; }
.sb-folder-row.depth-1{ padding-left:26px; }
.sb-folder-row.depth-2{ padding-left:42px; }
.sb-folder-row.depth-3{ padding-left:58px; }
.sb-folder-row.active{ background:var(--accent-soft); color:var(--accent); font-weight:600; }
.sb-chevron{
  width:14px; text-align:center; font-size:10px; color:var(--text-tertiary);
  transition:transform 150ms ease; flex-shrink:0; background:none; border:none; padding:0;
}
.sb-chevron.open{ transform:rotate(90deg); }
.sb-folder-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sb-folder-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sb-folder-add{
  opacity:0; border:none; background:transparent; color:var(--text-tertiary);
  width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0;
}
.sb-folder-row:hover .sb-folder-add{ opacity:1; }
.sb-folder-add:hover{ background:var(--overlay-3); color:var(--text); }
.sb-folder-row.drag-over{ outline:2px dashed var(--accent); outline-offset:-2px; }

.sb-new-folder-btn{
  margin-top:8px; display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:var(--radius-sm); border:1px dashed var(--separator);
  background:transparent; color:var(--text-secondary); font-size:var(--fs-sm); font-weight:500;
  transition:all 150ms ease;
}
.sb-new-folder-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

.sb-save-indicator{
  margin-top:12px; padding:6px 10px; font-size:var(--fs-2xs); color:var(--text-tertiary);
}
.sb-save-indicator.error{ color:var(--danger); font-weight:600; }

.sb-main{ flex:1; min-width:0; padding:32px 40px; max-width:100vw; height:100%; overflow-y:auto; }
.sb-main-inner{ max-width:840px; margin:0 auto; }

/* ---------- Banners ---------- */
.sb-banner{
  display:flex; align-items:center; gap:10px; justify-content:space-between;
  background:var(--warning-soft); border:1px solid var(--warning); color:var(--text);
  border-radius:var(--radius); padding:12px 16px; font-size:var(--fs-sm); margin-bottom:16px;
}
.sb-banner button{
  background:var(--overlay-2); border:none; border-radius:999px; padding:6px 14px;
  font-size:var(--fs-xs); font-weight:600; white-space:nowrap;
}
.sb-banner button:hover{ background:var(--overlay-3); }

/* ---------- Capture box ---------- */
.sb-capture{
  background:var(--bg-elevated); border:1px solid var(--separator); border-radius:var(--radius-lg);
  padding:16px; box-shadow:var(--shadow-sm); margin-bottom:14px;
}
.sb-capture textarea{
  width:100%; border:none; outline:none; resize:none; background:transparent;
  font-size:var(--fs-md); color:var(--text); min-height:44px; max-height:160px;
  font-family:inherit; line-height:1.5;
}
.sb-capture textarea::placeholder{ color:var(--text-tertiary); }
.sb-capture-row{ display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
.sb-chip{
  display:inline-flex; align-items:center; gap:6px; border:none; background:var(--overlay-2);
  color:var(--text-secondary); font-size:var(--fs-xs); font-weight:600; padding:7px 13px;
  border-radius:999px; transition:all 150ms ease;
}
.sb-chip:hover{ background:var(--overlay-3); }
.sb-chip.active{ background:var(--accent); color:#fff; }
.sb-chip.recording{ background:var(--danger); color:#fff; }
.sb-spacer{ flex:1; }
.sb-btn-cta{
  border:none; background:linear-gradient(135deg, var(--accent) 0%, #8B6BF2 100%); color:#fff; font-weight:700; font-size:var(--fs-sm);
  padding:10px 24px; border-radius:999px; transition:filter 150ms ease, transform 150ms ease;
  white-space:nowrap; box-shadow:0 4px 14px rgba(var(--accent-rgb),0.35);
}
.sb-btn-cta:hover{ filter:brightness(1.06); }
.sb-btn-cta:active{ transform:scale(0.97); }
.sb-btn-cta:disabled{ opacity:0.5; cursor:not-allowed; }
.sb-btn-secondary{
  border:1px solid var(--separator); background:var(--bg-elevated); color:var(--text);
  font-weight:600; font-size:var(--fs-sm); padding:8px 18px; border-radius:999px;
  transition:all 150ms ease;
}
.sb-btn-secondary:hover{ background:var(--overlay-2); }
.sb-btn-text{
  border:none; background:transparent; color:var(--text-secondary); font-weight:600;
  font-size:var(--fs-sm); padding:8px 12px; border-radius:var(--radius-sm);
}
.sb-btn-text:hover{ background:var(--overlay-2); color:var(--text); }
.sb-btn-danger-text{ color:var(--danger); }

.sb-link-input{
  margin-top:10px; width:100%; border:1px solid var(--separator); background:var(--bg);
  border-radius:var(--radius-sm); padding:9px 12px; outline:none; font-size:var(--fs-sm);
  transition:border-color 150ms ease, box-shadow 150ms ease;
}
.sb-link-input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

.sb-link-preview{
  margin-top:10px; display:flex; align-items:center; background:var(--overlay-1);
  border:1px solid var(--separator); border-radius:var(--radius-sm); padding:8px 10px; position:relative;
}
.sb-link-preview .lp-text{ min-width:0; }
.sb-link-preview .lp-title{ font-weight:600; font-size:var(--fs-sm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-link-preview .lp-sub{ color:var(--text-tertiary); font-size:var(--fs-xs); }

.sb-thumbs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.sb-thumb{ position:relative; width:60px; height:60px; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--separator); }
.sb-thumb img{ width:100%; height:100%; object-fit:cover; }
.sb-thumb button{
  position:absolute; top:2px; right:2px; width:16px; height:16px; border-radius:50%;
  background:rgba(0,0,0,0.55); color:#fff; border:none; font-size:10px; line-height:1;
  display:flex; align-items:center; justify-content:center;
}

.sb-voice-memo{
  display:flex; align-items:center; gap:8px; margin-top:8px; background:var(--overlay-1);
  border:1px solid var(--separator); border-radius:var(--radius-sm); padding:6px 8px; max-width:280px;
}
.sb-voice-memo .vm-ico{ font-size:14px; flex-shrink:0; }
.sb-voice-memo audio{ height:32px; flex:1; min-width:0; max-width:220px; }
.sb-voice-memo button{ border:none; background:none; color:var(--text-tertiary); font-size:13px; cursor:pointer; flex-shrink:0; padding:2px; }

.sb-error{
  background:var(--danger-soft); border:1px solid var(--danger); color:var(--danger);
  border-radius:var(--radius-sm); padding:10px 14px; font-size:var(--fs-sm); margin-top:10px;
}

/* ---------- Review panel ---------- */
.sb-review{
  background:var(--bg-elevated); border:1px solid var(--separator); border-radius:var(--radius-lg);
  padding:16px; box-shadow:var(--shadow-sm); margin-bottom:16px;
}
.sb-review-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sb-review-head h3{ font-size:var(--fs-md); }
.sb-review-row{
  border-top:1px solid var(--separator); padding:12px 0; display:flex; flex-direction:column; gap:8px;
}
.sb-review-row:first-of-type{ border-top:none; }
.sb-review-text{ font-weight:600; font-size:var(--fs-md); }
.sb-review-reason{ color:var(--text-secondary); font-size:var(--fs-xs); }
.sb-review-dupe{
  background:var(--warning-soft); color:#8a5a12; border-radius:var(--radius-sm);
  padding:6px 10px; font-size:var(--fs-xs); cursor:pointer; border:1px solid var(--warning);
}
html[data-theme="dark"] .sb-review-dupe{ color:var(--warning); }
.sb-review-controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.sb-select{
  border:1px solid var(--separator); background:var(--bg); border-radius:var(--radius-sm);
  padding:7px 10px; font-size:var(--fs-sm); outline:none; min-width:160px;
}
.sb-select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.sb-text-input{
  border:1px solid var(--separator); background:var(--bg); border-radius:var(--radius-sm);
  padding:7px 10px; font-size:var(--fs-sm); outline:none;
}
.sb-text-input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.sb-review-desc{ width:100%; resize:vertical; min-height:38px; max-height:140px; font-family:inherit; line-height:1.4; }
.sb-task-fields{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.sb-priority-chip{
  border:1px solid var(--separator); background:var(--bg-elevated); border-radius:999px;
  padding:5px 12px; font-size:var(--fs-2xs); font-weight:700; text-transform:uppercase; letter-spacing:0.02em;
}
.sb-priority-chip[data-p="low"].active{ background:var(--low-soft); color:var(--low); border-color:var(--low); }
.sb-priority-chip[data-p="medium"].active{ background:var(--warning-soft); color:var(--warning); border-color:var(--warning); }
.sb-priority-chip[data-p="high"].active{ background:var(--danger-soft); color:var(--danger); border-color:var(--danger); }
.sb-review-foot{ display:flex; justify-content:flex-end; gap:10px; margin-top:12px; }

/* ---------- Search ---------- */
.sb-topbar{ display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.sb-topbar .sb-search-wrap{ position:relative; margin-bottom:0; flex:1; min-width:0; }
.sb-topbar-btn{
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  border:1px solid var(--separator); background:var(--bg-elevated); box-shadow:var(--shadow-sm);
}
.sb-search-wrap{ position:relative; margin-bottom:20px; }
.sb-search{
  width:100%; border:1px solid var(--separator); background:var(--bg-elevated);
  border-radius:var(--radius); padding:11px 16px 11px 40px; outline:none; font-size:var(--fs-sm);
  box-shadow:var(--shadow-sm); transition:border-color 150ms ease, box-shadow 150ms ease;
}
.sb-search:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.sb-search-ico{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); font-size:14px; pointer-events:none; }
.sb-search-dropdown{
  position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--bg-elevated);
  border:1px solid var(--separator); border-radius:var(--radius); box-shadow:var(--shadow-lg);
  z-index:30; max-height:320px; overflow-y:auto; padding:6px;
}
.sb-search-item{
  display:flex; flex-direction:column; gap:2px; padding:9px 12px; border-radius:var(--radius-sm);
  cursor:pointer;
}
.sb-search-item:hover{ background:var(--overlay-2); }
.sb-search-item .si-title{ font-size:var(--fs-sm); font-weight:600; }
.sb-search-item .si-meta{ font-size:var(--fs-2xs); color:var(--text-tertiary); }

/* ---------- Breadcrumb / headers ---------- */
.sb-breadcrumb{ font-size:var(--fs-xs); color:var(--text-tertiary); margin-bottom:6px; display:flex; gap:4px; flex-wrap:wrap; }
.sb-breadcrumb a{ color:var(--text-tertiary); text-decoration:none; cursor:pointer; }
.sb-breadcrumb a:hover{ color:var(--accent); }
.sb-page-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:6px; }
.sb-page-title{ display:flex; align-items:center; gap:10px; font-size:var(--fs-2xl); }
.sb-page-desc{ color:var(--text-secondary); font-size:var(--fs-sm); margin-top:6px; max-width:60ch; }
.sb-page-actions{ display:flex; gap:6px; flex-wrap:wrap; }
.sb-page-actions button{
  border:1px solid var(--separator); background:var(--bg-elevated); color:var(--text-secondary);
  font-size:var(--fs-xs); font-weight:600; padding:7px 12px; border-radius:999px; transition:all 150ms ease;
}
.sb-page-actions button:hover{ background:var(--overlay-2); color:var(--text); }

/* ---------- Stats strip ---------- */
.sb-stats{ display:flex; gap:10px; margin:20px 0; flex-wrap:wrap; }
.sb-stat{
  flex:1; min-width:110px; background:var(--bg-elevated); border:1px solid var(--separator);
  border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow-sm);
}
.sb-stat .val{ font-size:var(--fs-xl); font-weight:700; }
.sb-stat .lbl{ font-size:var(--fs-2xs); color:var(--text-tertiary); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; margin-top:2px;}

/* ---------- Ask your second brain (home chat) ---------- */
.sb-brainchat{
  background:var(--bg-elevated); border:1px solid var(--separator); border-radius:var(--radius-lg);
  padding:16px; box-shadow:var(--shadow-sm); margin:20px 0;
}
.sb-brainchat-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sb-brainchat-head h3{ font-size:var(--fs-md); }
.sb-brainchat-messages{
  display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto;
  margin-bottom:10px; scroll-behavior:smooth;
}
.sb-brainchat-empty{ color:var(--text-tertiary); font-size:var(--fs-sm); padding:6px 2px; }
.sb-brainchat-msg{
  max-width:80%; padding:9px 13px; border-radius:var(--radius); font-size:var(--fs-sm); line-height:1.45;
  word-break:break-word; white-space:normal;
}
.sb-brainchat-msg.user{ align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.sb-brainchat-msg.assistant{ align-self:flex-start; background:var(--overlay-2); color:var(--text); border-bottom-left-radius:4px; }
.sb-brainchat-msg.loading{ display:flex; gap:4px; align-items:center; padding:12px 14px; }
.sb-brainchat-msg.loading span{
  width:6px; height:6px; border-radius:50%; background:var(--text-tertiary); display:inline-block;
  animation:brainDot 1.2s ease-in-out infinite;
}
.sb-brainchat-msg.loading span:nth-child(2){ animation-delay:0.15s; }
.sb-brainchat-msg.loading span:nth-child(3){ animation-delay:0.3s; }
@keyframes brainDot{ 0%,80%,100%{ opacity:0.3; transform:translateY(0); } 40%{ opacity:1; transform:translateY(-3px); } }
.sb-brainchat-input-row{ display:flex; gap:8px; }
.sb-brainchat-input-row input{
  flex:1; border:1px solid var(--separator); background:var(--bg); border-radius:999px;
  padding:9px 16px; outline:none; font-size:var(--fs-sm); transition:border-color 150ms ease, box-shadow 150ms ease;
}
.sb-brainchat-input-row input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

/* ---------- Section blocks ---------- */
.sb-section{ margin:20px 0; }
.sb-section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sb-home-more-hint{ text-align:center; color:var(--text-tertiary); font-size:var(--fs-xs); padding:14px 0 4px; }
.sb-section-head h3{ font-size:var(--fs-base); color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.04em; font-weight:700; }

/* ---------- Folder tiles (subfolder list) ---------- */
.sb-folder-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:10px; }
.sb-folder-tile{
  display:flex; align-items:center; gap:10px; background:var(--bg-elevated); border:1px solid var(--separator);
  border-radius:var(--radius); padding:13px 14px; cursor:pointer; transition:all 150ms ease; text-align:left;
}
.sb-folder-tile:hover{ box-shadow:var(--shadow-md); border-color:var(--accent); transform:translateY(-1px); }
.sb-folder-tile .ico{ font-size:20px; }
.sb-folder-tile .name{ font-weight:600; font-size:var(--fs-sm); }
.sb-folder-tile .cnt{ color:var(--text-tertiary); font-size:var(--fs-2xs); }

/* ---------- Notes list ---------- */
.sb-note-list{ display:flex; flex-direction:column; gap:10px; }
.sb-note{
  background:var(--bg-elevated); border:1px solid var(--separator); border-radius:var(--radius);
  padding:14px 16px; box-shadow:var(--shadow-sm); animation:sbFadeIn 0.18s ease;
  transition:box-shadow 150ms ease, border-color 150ms ease;
}
.sb-note:hover{ box-shadow:var(--shadow-md); }
.sb-note.flash{ animation:noteFlash 1.6s ease; }
.sb-note.pinned{ border-color:var(--accent); }
@keyframes sbFadeIn{ from{ opacity:0; transform:translateY(3px);} to{ opacity:1; transform:translateY(0);} }
@keyframes noteFlash{ 0%{ background:var(--accent-soft);} 100%{ background:var(--bg-elevated);} }
.sb-note-top{ display:flex; align-items:flex-start; gap:10px; }
.sb-note-check{ width:20px; height:20px; border-radius:50%; border:2px solid var(--separator); flex-shrink:0; background:transparent; margin-top:1px; transition:all 150ms ease; }
.sb-note-check.done{ background:var(--low); border-color:var(--low); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; }
.sb-note-check:hover{ border-color:var(--accent); }
.sb-note-body{ flex:1; min-width:0; }
.sb-note-content{ font-size:var(--fs-md); font-weight:500; cursor:pointer; word-break:break-word; }
.sb-note-content.done{ text-decoration:line-through; color:var(--text-tertiary); }
.sb-note-meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:6px; }
.sb-note-time{ color:var(--text-tertiary); font-size:var(--fs-2xs); }
.sb-badge-priority{ font-size:var(--fs-2xs); font-weight:700; padding:2px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:0.02em; }
.sb-badge-priority.low{ background:var(--low-soft); color:var(--low); }
.sb-badge-priority.medium{ background:var(--warning-soft); color:var(--warning); }
.sb-badge-priority.high{ background:var(--danger-soft); color:var(--danger); }
.sb-badge-due{ font-size:var(--fs-2xs); color:var(--text-secondary); background:var(--overlay-2); padding:2px 8px; border-radius:999px; }
.sb-badge-due.overdue{ background:var(--danger-soft); color:var(--danger); font-weight:600; }
.sb-note-actions{ display:flex; align-items:center; gap:2px; flex-shrink:0; }
.sb-note-menu-btn{ width:26px; height:26px; border-radius:50%; border:none; background:transparent; color:var(--text-tertiary); }
.sb-note-menu-btn:hover{ background:var(--overlay-2); color:var(--text); }
.sb-loading-placeholder{ color:var(--text-tertiary); font-size:var(--fs-sm); padding:40px 0; text-align:center; }
.sb-note-desc-view{ margin-top:6px; font-size:var(--fs-sm); color:var(--text-secondary); line-height:1.45; }
.sb-note-gallery{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.sb-note-gallery img{ width:72px; height:72px; object-fit:cover; border-radius:var(--radius-sm); cursor:pointer; border:1px solid var(--separator); }
.sb-note-link{
  display:block; margin-top:8px; padding:0; font-size:var(--fs-sm); font-weight:600; color:var(--accent);
  text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.sb-note-link:hover{ text-decoration:underline; }
.sb-pin-star{ color:var(--accent); font-size:12px; margin-right:4px; }
.sb-wiki-link{ color:var(--accent); font-weight:600; cursor:pointer; text-decoration:none; }
.sb-wiki-link:hover{ text-decoration:underline; }

.sb-empty{ text-align:center; padding:50px 20px; color:var(--text-tertiary); }
.sb-empty .e-ico{ font-size:34px; margin-bottom:10px; }
.sb-empty .e-title{ font-weight:600; color:var(--text-secondary); font-size:var(--fs-md); }
.sb-empty .e-sub{ font-size:var(--fs-xs); margin-top:4px; }

/* ---------- Tasks agenda ---------- */
.sb-task-bucket{ margin-bottom:22px; }
.sb-task-bucket-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.sb-task-bucket-head h4{ font-size:var(--fs-sm); text-transform:uppercase; letter-spacing:0.04em; color:var(--text-secondary); }
.sb-task-bucket-count{ background:var(--overlay-2); color:var(--text-tertiary); font-size:var(--fs-2xs); font-weight:700; padding:2px 8px; border-radius:999px; }
.sb-task-bucket-head.overdue h4{ color:var(--danger); }

/* ---------- Modals ---------- */
.sb-modal-backdrop{
  position:fixed; inset:0; background:rgba(26,23,20,0.4); display:flex; align-items:center;
  justify-content:center; z-index:100; padding:20px; animation:sbFadeIn 0.15s ease;
}
.sb-modal{
  background:var(--bg-elevated); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:460px; max-height:86vh; overflow-y:auto; padding:24px;
}
.sb-modal.wide{ max-width:640px; }
.sb-modal h2{ font-size:var(--fs-lg); margin-bottom:16px; }
.sb-field{ margin-bottom:14px; }
.sb-field label{ display:block; font-size:var(--fs-xs); font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
.sb-field input[type=text], .sb-field input[type=password], .sb-field input[type=date], .sb-field textarea, .sb-field select{
  width:100%; border:1px solid var(--separator); background:var(--bg); border-radius:var(--radius-sm);
  padding:9px 12px; outline:none; font-size:var(--fs-sm); transition:all 150ms ease;
}
.sb-field input:focus, .sb-field textarea:focus, .sb-field select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.sb-field textarea{ resize:vertical; min-height:70px; font-family:inherit; }
.sb-field-row{ display:flex; gap:10px; }
.sb-field-row > *{ flex:1; }
.sb-modal-foot{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
.sb-toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
.sb-toggle{ position:relative; width:38px; height:22px; border-radius:999px; background:var(--overlay-3); border:none; flex-shrink:0; transition:background 150ms ease; }
.sb-toggle::after{ content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:var(--shadow-sm); transition:transform 150ms ease; }
.sb-toggle.on{ background:var(--accent); }
.sb-toggle.on::after{ transform:translateX(16px); }
.sb-emoji-categories{ max-height:260px; overflow-y:auto; margin-top:8px; padding-right:4px; }
.sb-emoji-cat-label{ font-size:var(--fs-2xs); font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-tertiary); margin:12px 0 6px; }
.sb-emoji-cat-label:first-child{ margin-top:0; }
.sb-emoji-grid{ display:flex; flex-wrap:wrap; gap:6px; }
.sb-emoji-opt{ width:34px; height:34px; border-radius:var(--radius-sm); border:1px solid transparent; background:var(--overlay-1); display:flex; align-items:center; justify-content:center; color:var(--text-secondary); }
.sb-emoji-opt.sel{ border-color:var(--accent); background:var(--accent-soft); color:var(--accent); }
.sb-folder-ico-svg{ color:var(--accent); vertical-align:middle; flex-shrink:0; }
.sb-emoji-opt .sb-folder-ico-svg{ color:inherit; }
.sb-color-grid{ display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
.sb-color-opt{ width:26px; height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
.sb-color-opt.sel{ border-color:var(--text); box-shadow:0 0 0 2px var(--bg-elevated) inset; }
.sb-history-item{ padding:10px 0; border-top:1px solid var(--separator); font-size:var(--fs-sm); }
.sb-history-item:first-child{ border-top:none; }
.sb-history-item .h-meta{ display:flex; justify-content:space-between; align-items:center; }
.sb-history-item .h-time{ color:var(--text-tertiary); font-size:var(--fs-2xs); }
.sb-history-item button{ font-size:var(--fs-2xs); color:var(--accent); background:none; border:none; font-weight:600; }
.sb-shortcut-row{ display:flex; justify-content:space-between; padding:8px 0; border-top:1px solid var(--separator); font-size:var(--fs-sm); }
.sb-shortcut-row:first-child{ border-top:none; }
.sb-kbd{ background:var(--overlay-2); border-radius:6px; padding:2px 8px; font-size:var(--fs-xs); font-weight:600; }

/* ---------- Bulk select bar ---------- */
.sb-bulkbar{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:50;
  background:var(--text); color:var(--bg); padding:10px 12px; border-radius:999px;
  display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-lg);
}
html[data-theme="dark"] .sb-bulkbar{ background:var(--bg-elevated); color:var(--text); border:1px solid var(--separator); }
.sb-bulkbar button{ background:rgba(255,255,255,0.14); border:none; color:inherit; font-size:var(--fs-xs); font-weight:600; padding:7px 14px; border-radius:999px; }
.sb-bulkbar button:hover{ background:rgba(255,255,255,0.24); }
.sb-bulkbar .cnt{ font-size:var(--fs-xs); font-weight:700; padding:0 6px; }

/* ---------- Toast ---------- */
#toastRoot{ position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
.sb-toast{
  background:var(--text); color:var(--bg); padding:11px 16px; border-radius:var(--radius-sm);
  font-size:var(--fs-sm); font-weight:500; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:12px;
  animation:toastIn 4s ease forwards;
}
.sb-toast button{ background:rgba(255,255,255,0.15); border:none; color:inherit; font-weight:700; padding:5px 12px; border-radius:999px; font-size:var(--fs-xs); flex-shrink:0; }
@keyframes toastIn{
  0%{ opacity:0; transform:translateY(-6px); }
  6%{ opacity:1; transform:translateY(0); }
  88%{ opacity:1; }
  100%{ opacity:0; }
}

/* ---------- Bottom nav (mobile) ---------- */
.sb-bottomnav{ display:none; }
.sb-mobile-menu-btn{ display:none; }
.sb-mobile-drawer{ display:none; }

@media (max-width: 720px){
  body{ padding:0; }
  #appShell{ border-radius:0; box-shadow:none; height:auto; min-height:100vh; overflow:visible; }
  #app{ flex-direction:column; }
  .sb-topheader{ padding:10px 12px; gap:10px; }
  .sb-header-brand-label{ display:none; }
  .sb-header-search{ flex:1; min-width:0; }
  .sb-profile-text, .sb-profile-chevron{ display:none; }
  .sb-profile-chip{ padding:5px; }
  .sb-main{ height:auto; overflow-y:visible; }
  .sb-page-head{ flex-direction:column; align-items:stretch; gap:10px; }
  .sb-page-actions{ width:100%; }
  .sb-page-actions button{ padding:9px 14px; font-size:var(--fs-sm); }
  .sb-chip{ padding:9px 14px; font-size:var(--fs-sm); }
  .sb-priority-chip{ padding:9px 14px; }
  .sb-sidebar{ display:none; }
  .sb-mobile-menu-btn{ display:flex; }
  .sb-main{ padding:20px 16px 90px; }
  .sb-bottomnav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--bg-elevated);
    border-top:1px solid var(--separator); z-index:60; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .sb-bottomnav button{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none;
    color:var(--text-tertiary); font-size:var(--fs-2xs); font-weight:600; padding:6px 2px;
  }
  .sb-bottomnav button.active{ color:var(--accent); }
  .sb-bottomnav .bn-ico{ font-size:18px; }
  .sb-bottomnav .bn-add{
    background:linear-gradient(135deg, var(--accent) 0%, #8B6BF2 100%); color:#fff; width:44px; height:44px; border-radius:50%; margin-top:-20px;
    display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:var(--shadow-md);
  }
  .sb-mobile-drawer.open{
    display:block; position:fixed; inset:0; background:rgba(26,23,20,0.4); z-index:90; animation:sbFadeIn 0.15s ease;
  }
  .sb-mobile-drawer-panel{
    position:absolute; top:0; left:0; bottom:0; width:84%; max-width:320px; background:var(--bg-sidebar);
    padding:18px 14px; overflow-y:auto; box-shadow:var(--shadow-lg);
  }
  .sb-mobile-drawer-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .sb-mobile-drawer-head h3{ font-size:var(--fs-md); }
}

/* ---------- Print ---------- */
@media print{
  .sb-sidebar, .sb-topheader, .sb-capture, .sb-search-wrap, .sb-page-actions, .sb-bottomnav, #toastRoot, .sb-note-actions, .sb-bulkbar{ display:none !important; }
  .sb-main{ padding:0; }
  body{ background:#fff; color:#000; }
}
</style>
</head>
<body>

</div>

function makeId(prefix){
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,9);
}

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatTime(ts){
  var d = new Date(ts);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = d.getHours(), m = d.getMinutes();
  var hh = (h % 12 === 0 ? 12 : h % 12);
  var ampm = h < 12 ? 'AM' : 'PM';
  var mm = m < 10 ? '0'+m : m;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + hh + ':' + mm + ' ' + ampm;
}

function todayISO(d){
  d = d || new Date();
  var y = d.getFullYear(), m = (d.getMonth()+1), day = d.getDate();
  return y + '-' + (m<10?'0'+m:m) + '-' + (day<10?'0'+day:day);
}

function isoDaysAgo(n){
  var d = new Date();
  d.setDate(d.getDate() - n);
  return todayISO(d);
}

function isoDaysFromNow(n){
  var d = new Date();
  d.setDate(d.getDate() + n);
  return todayISO(d);
}

function addToDate(iso, unit){
  var parts = iso.split('-').map(Number);
  var d = new Date(parts[0], parts[1]-1, parts[2]);
  if(unit === 'daily') d.setDate(d.getDate()+1);
  else if(unit === 'weekly') d.setDate(d.getDate()+7);
  else if(unit === 'monthly') d.setMonth(d.getMonth()+1);
  return todayISO(d);
}

function debounce(fn, ms){
  var t = null;
  return function(){
    var args = arguments, ctx = this;
    clearTimeout(t);
    t = setTimeout(function(){ fn.apply(ctx, args); }, ms);
  };
}

function normalizeWords(str){
  return (str||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(Boolean);
}

function levenshtein(a, b){
  if(a === b) return 0;
  var al = a.length, bl = b.length;
  if(al === 0) return bl;
  if(bl === 0) return al;
  if(Math.abs(al-bl) > 3) return 99; // fast bail
  var prev = new Array(bl+1);
  for(var j=0;j<=bl;j++) prev[j]=j;
  for(var i=1;i<=al;i++){
    var cur = [i];
    for(var jj=1;jj<=bl;jj++){
      var cost = a[i-1]===b[jj-1] ? 0 : 1;
      cur[jj] = Math.min(prev[jj]+1, cur[jj-1]+1, prev[jj-1]+cost);
    }
    prev = cur;
  }
  return prev[bl];
}

function fuzzyIncludes(haystack, needle){
  if(!needle) return true;
  haystack = (haystack||'').toLowerCase();
  needle = needle.toLowerCase();
  if(haystack.indexOf(needle) !== -1) return true;
  var hWords = haystack.split(/\s+/);
  var maxDist = needle.length <= 4 ? 1 : 2;
  for(var i=0;i<hWords.length;i++){
    var w = hWords[i];
    if(Math.abs(w.length - needle.length) > maxDist+1) continue;
    if(levenshtein(w, needle) <= maxDist) return true;
  }
  return false;
}

function jaccardSimilarity(a, b){
  var wa = new Set(normalizeWords(a));
  var wb = new Set(normalizeWords(b));
  if(wa.size === 0 || wb.size === 0) return 0;
  var inter = 0;
  wa.forEach(function(w){ if(wb.has(w)) inter++; });
  var union = new Set(wa); wb.forEach(function(w){ union.add(w); });
  return inter / union.size;
}

function jsonBinErrorText(res){

  });
}

function remoteSyncGet(){
  var key = state.settings.syncApiKey, bin = state.settings.syncBinId;
  return fetch('https://api.jsonbin.io/v3/b/' + encodeURIComponent(bin) + '/latest', {
    method: 'GET',
    headers: { 'X-Master-Key': key, 'X-Bin-Meta': 'false' }
  }).then(function(res){
    if(!res.ok) return jsonBinErrorText(res).then(function(msg){ throw new Error('Sync read failed: ' + msg); });
    return res.json();
  }).catch(function(err){
    if(err instanceof TypeError) throw new Error('Network/CORS error reaching JSONBin — check your internet connection or that the API isn\'t blocked here.');
    throw err;
  });
}

function remoteSyncSet(dataObj){
  var key = state.settings.syncApiKey, bin = state.settings.syncBinId;
  return fetch('https://api.jsonbin.io/v3/b/' + encodeURIComponent(bin), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': key },
    body: JSON.stringify(dataObj)
  }).then(function(res){
    if(!res.ok) return jsonBinErrorText(res).then(function(msg){ throw new Error('Sync write failed: ' + msg); });
    return res.json();
  }).catch(function(err){
    if(err instanceof TypeError) throw new Error('Network/CORS error reaching JSONBin — check your internet connection or that the API isn\'t blocked here.');
    throw err;
  });
}

  }).then(function(res){

  }).then(function(json){

  }).catch(function(err){

    throw err;
  });
}

function hasCloudStorage(){
  return !!(window.storage && typeof window.storage.get === 'function');
}

function retryPromise(fn, attempts, delayMs){
  return fn().catch(function(err){
    if(attempts <= 1) throw err;
    return new Promise(function(resolve){ setTimeout(resolve, delayMs); }).then(function(){
      return retryPromise(fn, attempts - 1, delayMs);
    });
  });
}

function storageGet(key){
  if(hasCloudStorage()){
    return retryPromise(function(){ return window.storage.get(key); }, 2, 400).then(function(res){
      return res ? res.value : null;
    }).catch(function(err){
      console.warn('Cloud storage read failed after retry, falling back to this device\'s local copy:', err);
      try{ return localStorage.getItem(key); }catch(e){ return null; }
    });
  }
  try{ return Promise.resolve(localStorage.getItem(key)); }catch(e){ return Promise.resolve(null); }
}

function storageSet(key, value){
  var localOk = false;
  try{ localStorage.setItem(key, value); localOk = true; }catch(e){ console.warn('Local storage write failed', e); }
  if(hasCloudStorage()){
    return retryPromise(function(){ return window.storage.set(key, value); }, 2, 400).then(function(res){
      lastSaveSynced = true;
      return res;
    }).catch(function(err){
      console.warn('Cloud storage write failed after retry, but saved locally on this device:', err);
      lastSaveSynced = false;
      if(localOk) return null;
      throw err;
    });
  }
  return localOk ? Promise.resolve(true) : Promise.reject(new Error('Local storage unavailable'));
}

function storageDelete(key){
  try{ localStorage.removeItem(key); }catch(e){}
  if(hasCloudStorage()){
    return window.storage.delete(key).catch(function(){});
  }
  return Promise.resolve();
}

function pullRemoteState(){
  if(!hasRemoteSync()) return Promise.reject(new Error('Remote sync not configured'));
  var myKey = state.settings.syncApiKey, myBin = state.settings.syncBinId;
  var localModifiedAt = state.lastModifiedAt || 0;
  return remoteSyncGet().then(function(remote){
    if(remote && remote.folders){
      var remoteModifiedAt = remote.lastModifiedAt || 0;
      if(remoteModifiedAt < localModifiedAt){
        // This device's local copy is newer than what's in the cloud (e.g. a very recent
        // edit whose upload hasn't landed yet, or this pull raced ahead of it).
        // Keep the local copy and push it up instead of letting stale cloud data win.
        return remoteSyncSet({
          folders: state.folders, trash: state.trash, settings: state.settings,
          digest: state.digest, taskSortOrder: state.taskSortOrder, lastModifiedAt: localModifiedAt
        }).catch(function(){});
      }
      remote.pendingImages = [];
      remote.pendingReview = [];
      remote.pendingLinkPreview = null;
      remote.pendingVoiceNote = null;
      remote.selected = {};
      remote.selectMode = false;
      state = Object.assign(defaultState(), remote);
      state.settings.syncApiKey = myKey;
      state.settings.syncBinId = myBin;
      state.settings.lastSyncAt = Date.now();
      applyThemeFromSettings();
      // Mirror the freshly-pulled remote data into this device's local copy too.
      storageSet(STORAGE_KEY, JSON.stringify({
        folders: state.folders, trash: state.trash, settings: state.settings,
        digest: state.digest, taskSortOrder: state.taskSortOrder, lastModifiedAt: state.lastModifiedAt
      })).catch(function(){});
    }
  });
}

function loadState(){
  return storageGet(STORAGE_KEY).then(function(raw){
    try{
      if(raw){
        var parsed = JSON.parse(raw);
        state = Object.assign(defaultState(), parsed);
        if(!state.folders || !state.folders.length) state.folders = defaultFolders();
        if(!state.trash) state.trash = { notes:[], folders:[] };
        if(!state.settings) state.settings = defaultState().settings;
        if(!state.digest) state.digest = { text:'', generatedAt:null, noteCount:0 };
        state.pendingImages = [];
        state.pendingReview = [];
        state.pendingLinkPreview = null;
        state.pendingVoiceNote = null;
        state.selected = {};
        state.selectMode = false;
      } else {
        state = defaultState();
      }
    }catch(e){
      console.error('loadState failed', e);
      state = defaultState();
    }
    applyThemeFromSettings();

    if(hasRemoteSync()){
      return pullRemoteState().catch(function(err){
        console.warn('Remote sync pull failed, using this device\'s local copy:', err);
      });
    }
  });
}

function applyThemeFromSettings(){
  if(state.settings.theme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
  } else if(state.settings.theme === 'system'){
    applySystemTheme();
  } else {
    document.documentElement.setAttribute('data-theme','light');
  }
}

function applySystemTheme(){
  var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}

function saveLocalSettingsOnly(){

  };

}

function saveState(){
  state.lastModifiedAt = Date.now();
  var toSave = {
    folders: state.folders,
    trash: state.trash,
    settings: state.settings,
    digest: state.digest,
    taskSortOrder: state.taskSortOrder,

/* ============================================================
   FOLDER TREE HELPERS
   ============================================================ */
function findFolderById(id, folders){
  folders = folders || state.folders;
  for(var i=0;i<folders.length;i++){
    if(folders[i].id === id) return folders[i];
    var found = findFolderById(id, folders[i].subfolders);
    if(found) return found;
  }
  return null;
}

function findFolderByName(name, folders){
  folders = folders || state.folders;
  var lname = (name||'').trim().toLowerCase();
  for(var i=0;i<folders.length;i++){
    if(folders[i].name.trim().toLowerCase() === lname) return folders[i];
    var found = findFolderByName(name, folders[i].subfolders);
    if(found) return found;
  }
  return null;
}

// returns {arr, index, parent} where arr is the array containing the folder, parent is containing folder or null (top level)
function locateFolder(id, folders, parent){
  folders = folders || state.folders;
  for(var i=0;i<folders.length;i++){
    if(folders[i].id === id) return { arr:folders, index:i, parent: parent || null };
    var found = locateFolder(id, folders[i].subfolders, folders[i]);
    if(found) return found;
  }
  return null;
}

function getFolderPath(id){
  var path = [];
  function walk(folders, trail){
    for(var i=0;i<folders.length;i++){
      var t = trail.concat([folders[i]]);
      if(folders[i].id === id){ path = t; return true; }
      if(walk(folders[i].subfolders, t)) return true;
    }
    return false;
  }
  walk(state.folders, []);
  return path;
}

function flattenFolders(folders, path, depth){
  folders = folders || state.folders;
  path = path || '';
  depth = depth || 0;
  var out = [];
  for(var i=0;i<folders.length;i++){
    var f = folders[i];
    var fullPath = path ? path + ' > ' + f.name : f.name;
    out.push({ folder:f, path:fullPath, depth:depth });
    out = out.concat(flattenFolders(f.subfolders, fullPath, depth+1));
  }
  return out;
}

function flattenForPrompt(){
  var flat = flattenFolders();
  return flat.map(function(item){
    var f = item.folder;
    var tag = f.taskList ? ' [task list: has priority + due date]' : '';
    return '- ' + f.name + ' (' + item.path + ')' + tag + ': ' + (f.description || f.summary || '');
  }).join('\n');
}

function folderIsTaskList(folder){
  if(!folder) return false;
  if(folder.taskList) return true;
  return isTaskFolderName(folder.name);
}

function isTaskFolderName(name){
  var n = (name||'').toLowerCase();
  return n.indexOf('to do') !== -1 || n.indexOf('todo') !== -1 || n.indexOf('to-do') !== -1 || n.indexOf('to buy') !== -1;
}

function countNotesRecursive(folder){
  var count = folder.notes.length;
  for(var i=0;i<folder.subfolders.length;i++) count += countNotesRecursive(folder.subfolders[i]);
  return count;
}

function getAllNotesCached(){
  if(notesCache) return notesCache;
  var out = [];
  function walk(folders, path){
    for(var i=0;i<folders.length;i++){
      var f = folders[i];
      var p = path ? path + ' > ' + f.name : f.name;
      for(var j=0;j<f.notes.length;j++){
        out.push({ note:f.notes[j], folder:f, path:p });
      }
      walk(f.subfolders, p);
    }
  }
  walk(state.folders, '');
  notesCache = out;
  return out;
}

function createFolder(name, opts){
  opts = opts || {};
  var f = {
    id: makeId('f'),
    name: name,
    icon: opts.icon || '📁',
    color: opts.color || null,
    description: opts.description || '',
    summary: opts.summary || (opts.description || '').slice(0,70),
    notes: [],
    subfolders: [],
    expanded: true,
    taskList: !!opts.taskList || isTaskFolderName(name)
  };
  return f;
}

function deleteFolderCascade(id){
  var loc = locateFolder(id);
  if(!loc) return;
  var folder = loc.arr[loc.index];
  state.trash.folders.push({ folder: JSON.parse(JSON.stringify(folder)), deletedAt: Date.now() });
  loc.arr.splice(loc.index, 1);
  if(state.selectedFolderId === id){ state.selectedFolderId = null; state.view = 'home'; }
}

function moveFolderTo(id, newParentId){
  var loc = locateFolder(id);
  if(!loc) return false;
  var folder = loc.arr[loc.index];
  // prevent moving into itself or its own descendant
  if(newParentId){
    var path = getFolderPath(newParentId);
    if(path.some(function(f){ return f.id === id; })) return false;
  }
  loc.arr.splice(loc.index, 1);
  if(newParentId){
    var target = findFolderById(newParentId);
    if(!target) { loc.arr.splice(loc.index,0,folder); return false; }
    target.subfolders.push(folder);
    target.expanded = true;
  } else {
    state.folders.push(folder);
  }
  return true;
}

function mergeFolderInto(sourceId, targetId){
  if(sourceId === targetId) return false;
  var src = findFolderById(sourceId);
  var tgt = findFolderById(targetId);
  if(!src || !tgt) return false;
  var path = getFolderPath(targetId);
  if(path.some(function(f){ return f.id === sourceId; })) return false; // can't merge into own descendant
  tgt.notes = tgt.notes.concat(src.notes);
  tgt.subfolders = tgt.subfolders.concat(src.subfolders);
  var loc = locateFolder(sourceId);
  loc.arr.splice(loc.index, 1);
  if(state.selectedFolderId === sourceId) state.selectedFolderId = targetId;
  return true;
}

function createNote(content, opts){

  return {
    id: makeId('n'),
    content: content,

    images: opts.images || (opts.image ? [opts.image] : []),
    linkPreview: opts.linkPreview || null,
    voiceNote: opts.voiceNote || null,
    time: formatTime(Date.now()),
    createdAt: Date.now(),
    description: opts.description || undefined,
    priority: opts.priority || undefined,
    dueDate: opts.dueDate || undefined,
    done: false,
    pinned: false,
    recurrence: opts.recurrence || undefined,
    history: []
  };
}

function findNoteLocation(noteId){
  var all = getAllNotesCached();
  for(var i=0;i<all.length;i++){
    if(all[i].note.id === noteId) return all[i];
  }
  return null;
}

function pushHistory(note){
  note.history = note.history || [];
  note.history.unshift({ content: note.content, description: note.description, at: Date.now() });
  if(note.history.length > 10) note.history.length = 10;
}

function deleteNoteSoft(folderId, noteId){
  var folder = findFolderById(folderId);
  if(!folder) return;
  var idx = folder.notes.findIndex(function(n){ return n.id === noteId; });
  if(idx === -1) return;
  var note = folder.notes[idx];
  state.trash.notes.push({ note: JSON.parse(JSON.stringify(note)), folderId: folderId, folderName: folder.name, deletedAt: Date.now() });
  folder.notes.splice(idx, 1);
}

function restoreNote(trashIndex){
  var entry = state.trash.notes[trashIndex];
  if(!entry) return;
  var folder = findFolderById(entry.folderId);
  if(!folder){
    folder = findFolderByName('Uncategorized');
    if(!folder){
      folder = createFolder('Uncategorized', { description:'Notes restored without their original folder.' });
      state.folders.push(folder);
    }
  }
  folder.notes.unshift(entry.note);
  state.trash.notes.splice(trashIndex, 1);
}

function restoreFolder(trashIndex){
  var entry = state.trash.folders[trashIndex];
  if(!entry) return;
  state.folders.push(entry.folder);
  state.trash.folders.splice(trashIndex, 1);
}

function findPossibleDuplicate(text){
  var all = getAllNotesCached();
  var best = null, bestScore = 0;
  all.forEach(function(item){
    var score = jaccardSimilarity(text, item.note.content);
    if(score > bestScore){ bestScore = score; best = item; }
  });
  if(best && bestScore >= 0.55){
    return { folder: best.folder, note: best.note, score: bestScore };
  }
  return null;
}

/* ============================================================
   TASK HELPERS
   ============================================================ */
function getAllTasks(){
  var all = getAllNotesCached();
  return all.filter(function(item){ return folderIsTaskList(item.folder); });
}

function computeTaskBuckets(){
  var tasks = getAllTasks();
  var today = todayISO();
  var weekAhead = isoDaysFromNow(7);
  var buckets = { overdue:[], today:[], week:[], later:[], none:[], completed:[] };
  tasks.forEach(function(item){
    var n = item.note;
    if(n.done){ buckets.completed.push(item); return; }
    if(!n.dueDate){ buckets.none.push(item); return; }
    if(n.dueDate < today){ buckets.overdue.push(item); }
    else if(n.dueDate === today){ buckets.today.push(item); }
    else if(n.dueDate <= weekAhead){ buckets.week.push(item); }
    else { buckets.later.push(item); }
  });
  ['overdue','today','week','later','none','completed'].forEach(function(k){
    buckets[k].sort(function(a,b){
      var da = a.note.dueDate || '9999-99-99', db = b.note.dueDate || '9999-99-99';
      return da < db ? -1 : da > db ? 1 : 0;
    });
  });
  return buckets;
}

var PRIORITY_WEIGHT = { high:3, medium:2, low:1 };

function comparePriority(a, b, dir){
  var pa = PRIORITY_WEIGHT[a.priority || 'medium'] || 2;
  var pb = PRIORITY_WEIGHT[b.priority || 'medium'] || 2;
  return dir === 'asc' ? (pa - pb) : (pb - pa);
}

function computeTaskBucketsByPriority(){
  var tasks = getAllTasks();
  var buckets = { high:[], medium:[], low:[], completed:[] };
  tasks.forEach(function(item){
    var n = item.note;
    if(n.done){ buckets.completed.push(item); return; }
    var p = (n.priority && buckets[n.priority]) ? n.priority : 'medium';
    buckets[p].push(item);
  });
  ['high','medium','low','completed'].forEach(function(k){
    buckets[k].sort(function(a,b){
      var da = a.note.dueDate || '9999-99-99', db = b.note.dueDate || '9999-99-99';
      return da < db ? -1 : da > db ? 1 : 0;
    });
  });
  return buckets;
}

function renderTaskSortSelect(){

  html += '<option value="priority-desc"' + (order === 'priority-desc' ? ' selected' : '') + '>Priority: High → Low</option>';
  html += '<option value="priority-asc"' + (order === 'priority-asc' ? ' selected' : '') + '>Priority: Low → High</option>';
  html += '</select>';

}

function countOverdueTasks(){
  var today = todayISO();
  return getAllTasks().filter(function(item){ return !item.note.done && item.note.dueDate && item.note.dueDate < today; }).length;
}

function toggleTaskDone(folderId, noteId){
  var folder = findFolderById(folderId);
  if(!folder) return;
  var note = folder.notes.find(function(n){ return n.id === noteId; });
  if(!note) return;
  note.done = !note.done;
  if(note.done && note.recurrence){
    var next = createNote(note.content, {
      priority: note.priority,
      dueDate: note.dueDate ? addToDate(note.dueDate, note.recurrence) : '',
      recurrence: note.recurrence
    });
    folder.notes.push(next);
  }
  invalidateNotesCache();
  saveState();
}

function computeStreak(){
  var all = getAllNotesCached();
  var days = new Set(all.map(function(item){ return todayISO(new Date(item.note.createdAt)); }));
  var streak = 0;
  var cursor = new Date();
  while(true){
    var iso = todayISO(cursor);
    if(days.has(iso)){ streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

/* ============================================================
   AI — Gemini API calls
   ============================================================ */
var GEMINI_MODEL = 'gemini-3.5-flash';
function geminiApiUrl(){
  return 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':generateContent';
}

function hasGeminiKey(){
  return !!(state.settings && state.settings.geminiApiKey);
}

function toGeminiParts(contentBlocks){
  if(typeof contentBlocks === 'string'){
    return [{ text: contentBlocks }];
  }
  return contentBlocks.map(function(block){
    if(block.type === 'image'){
      return { inline_data: { mime_type: block.source.media_type, data: block.source.data } };
    }
    return { text: block.text };
  });
}

function geminiErrorFromResponse(res){
  return res.json().catch(function(){ return null; }).then(function(errBody){
    var msg = (errBody && errBody.error && errBody.error.message) ? errBody.error.message : ('HTTP ' + res.status);
    throw new Error('Gemini API error: ' + msg);
  });
}

function callGemini(systemPrompt, userContent, maxTokens){
  if(!hasGeminiKey()) return Promise.reject(new Error('Add your free Gemini API key in Settings to use AI features.'));
  var body = {
    contents: [{ role:'user', parts: toGeminiParts(userContent) }],
    generationConfig: { maxOutputTokens: maxTokens || 1000 }
  };
  if(systemPrompt) body.system_instruction = { parts:[{ text: systemPrompt }] };
  return fetch(geminiApiUrl(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': state.settings.geminiApiKey },
    body: JSON.stringify(body)
  }).then(function(res){
    if(!res.ok) return geminiErrorFromResponse(res);
    return res.json();
  });
}

function callGeminiMessages(systemPrompt, messages, maxTokens){
  if(!hasGeminiKey()) return Promise.reject(new Error('Add your free Gemini API key in Settings to use AI features.'));
  var contents = messages.map(function(m){
    return { role: (m.role === 'assistant' ? 'model' : 'user'), parts: [{ text: m.content }] };
  });
  var body = { contents: contents, generationConfig: { maxOutputTokens: maxTokens || 1000 } };
  if(systemPrompt) body.system_instruction = { parts:[{ text: systemPrompt }] };
  return fetch(geminiApiUrl(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': state.settings.geminiApiKey },
    body: JSON.stringify(body)
  }).then(function(res){
    if(!res.ok) return geminiErrorFromResponse(res);
    return res.json();
  });
}

function extractText(data){
  if(!data || !data.candidates || !data.candidates.length) return '';
  var content = data.candidates[0].content;
  if(!content || !content.parts) return '';
  return content.parts.map(function(p){ return p.text || ''; }).join('');
}

function classify(content, images){
  var systemPrompt = 'You are the filing assistant for a personal "second brain" note system with folders that can be nested (folders inside folders). Given the existing folders below and one new captured entry (text, and possibly an image), decide which folder(s) it belongs in.\n\n' +
'Existing folders (name, full path, description):\n' + flattenForPrompt() + '\n\n' +
'Today\'s date is ' + todayISO() + ' (YYYY-MM-DD).\n\n' +
'Rules:\n' +
'- First check whether the entry actually contains MULTIPLE separate thoughts or items — e.g. a shopping list ("milk, eggs, bread"), several unrelated ideas typed in one go, or a numbered/bulleted list. If so, split it into one array entry PER item, each filed independently. If it\'s genuinely one single thought, return an array with exactly one entry.\n' +
'- Never split a single idea that just happens to be a full sentence — only split when there are clearly distinct, separable items.\n' +
'- For each entry: "text" is that one item rewritten as a short, clean, natural standalone note — strip filler verbs and instructions down to the actual thing. "buy laptop" becomes "Laptop", "remind me to call mom" becomes "Call mom", "need to fix the bike" becomes "Fix the bike", "we need milk and eggs" becomes two entries "Milk" and "Eggs". Keep it minimal and natural, the way a person would jot it on a list, not a transcript of what they said.\n' +
'- "description": if the person included extra detail beyond the core item — a price, a brand, a size, a parenthetical note, a reason, a specific quantity, or any other clarifying context — pull that OUT of "text" and put it here instead, rewritten as a short natural phrase. Example: "Buy running shoes (500 PLN)" -> text: "Running shoes", description: "500 PLN". Example: "call the dentist, ask about the invoice from March" -> text: "Call the dentist", description: "Ask about the invoice from March". If there is no extra detail beyond the core item, return "description" as an empty string. Never duplicate in description something that is already fully captured by dueDate or priority alone.\n' +
'- IMPORTANT: always write "text", "description", "reasoning", and "newFolderDescription" in English, no matter what language the person wrote in. If they wrote in Polish (or any other language), translate the meaning into natural English — never leave the original-language text in the output.\n' +
'- If an existing folder (top-level or nested) clearly fits an entry, use its exact name and set isNew to false.\n' +
'- If nothing fits well for an entry, propose ONE new top-level folder with a short, plain English name and a one-sentence English description of what belongs there, and set isNew to true. Two entries needing the same new folder should use the identical folder name.\n' +
'- Folders marked [task list] are for to-do or to-buy style items with a priority and due date — route clear tasks or purchases there.\n' +
'- For entries going into a [task list] folder: if the text implies a timeframe ("in 3 days", "next Monday", "tomorrow", "this weekend", "by Friday"), compute the actual date using today\'s date above and return it as "dueDate" in YYYY-MM-DD format. If there\'s no clear timeframe, return "dueDate" as an empty string. Also infer "priority" ("low", "medium", or "high") from urgency words ("urgent", "asap", "important" -> high; "sometime", "no rush", "eventually" -> low); default to "medium" if unclear. For entries NOT going into a task-list folder, just return "dueDate": "" and "priority": "medium".\n' +
'- reasoning must be ONE short plain-language English sentence (under 14 words) per entry, written like a note to the person, not a system log.\n' +
'- Respond with ONLY a raw JSON array, no markdown fences, no preamble, no wrapping object. Shape:\n' +
'[{"text": "string", "description": "string or empty", "folder": "string", "isNew": boolean, "newFolderDescription": "string or empty", "reasoning": "string", "dueDate": "YYYY-MM-DD or empty string", "priority": "low" | "medium" | "high"}]';

  var contentBlocks = [];
  (images||[]).forEach(function(img){
    contentBlocks.push({ type:'image', source:{ type:'base64', media_type: img.mediaType, data: img.base64 } });
  });
  contentBlocks.push({ type:'text', text: content });

  return callGemini(systemPrompt, contentBlocks, 1200).then(function(data){
    var text = extractText(data);
    var cleaned = text.replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(cleaned);
    return Array.isArray(parsed) ? parsed : (parsed.items || [parsed]);
  });
}

function buildSearchIndex(){
  var lines = [];
  var flat = flattenFolders();
  flat.forEach(function(item){
    lines.push('[folder:' + item.folder.id + '] "' + item.path + '" — ' + (item.folder.description || item.folder.summary || ''));
  });
  var all = getAllNotesCached();
  all.forEach(function(item){
    lines.push('[note:' + item.note.id + '] in "' + item.path + '": ' + item.note.content +
      (item.note.description ? ' | detail: ' + item.note.description : ''));
  });
  return lines.join('\n');
}

function runSearchAI(query){
  var systemPrompt = 'You help find things in a personal "second brain" note app. Given the person\'s search phrase and the index of everything they\'ve stored (folders and individual notes), find the SINGLE best match.\n\n' +
'Index:\n' + buildSearchIndex() + '\n\n' +
'Rules:\n' +
'- Prefer matching a specific note if one clearly answers the search.\n' +
'- Only match a folder if the person seems to be looking for a whole topic/category rather than one specific thought.\n' +
'- If nothing reasonably matches, set type to "none".\n' +
'- Respond with ONLY raw JSON, no markdown, no preamble: {"type": "note" | "folder" | "none", "id": "string or empty"}';

  return callGemini(systemPrompt, query, 300).then(function(data){
    var text = extractText(data);
    var cleaned = text.replace(/```json|```/g, '').trim();
    return JSON.parse(cleaned);
  });
}

function buildBrainContext(){
  var lines = [];
  var flat = flattenFolders();
  flat.forEach(function(item){
    var f = item.folder;
    var tag = f.taskList ? ' [task list]' : '';
    lines.push('FOLDER "' + item.path + '"' + tag + (f.description ? ' — ' + f.description : ''));
  });
  lines.push('');
  var all = getAllNotesCached();
  all.forEach(function(item){
    var n = item.note;
    var meta = [];
    if(folderIsTaskList(item.folder)) meta.push(n.done ? 'done' : 'not done');
    if(n.priority) meta.push('priority: ' + n.priority);
    if(n.dueDate) meta.push('due: ' + n.dueDate);
    if(n.pinned) meta.push('pinned');
    if(n.recurrence) meta.push('repeats ' + n.recurrence);
    lines.push('- [' + item.path + '] ' + n.content +
      (n.description ? ' — ' + n.description : '') +
      (meta.length ? ' (' + meta.join(', ') + ')' : '') +
      ' (added ' + todayISO(new Date(n.createdAt)) + ')');
  });
  return lines.join('\n');
}

function askBrainAI(question, priorMessages){
  var systemPrompt = 'You are a helpful assistant built into someone\'s personal "second brain" note-taking app. ' +
    'You can see everything currently stored: every folder and every note inside it, given below. ' +
    'Answer the person\'s questions about their own notes directly and conversationally — summarize, count, filter, compare, or find things exactly as asked. ' +
    'If asked to count or list something, work it out precisely from the data below rather than guessing. ' +
    'If something isn\'t in their notes, say so plainly instead of making it up. ' +
    'Keep answers concise and in plain language — no markdown headers, no bullet-point walls unless a list is genuinely what was asked for. ' +
    'Today\'s date is ' + todayISO() + ' (YYYY-MM-DD).\n\n' +
    'Here is everything currently in their second brain:\n' + buildBrainContext();

  var messages = (priorMessages || []).map(function(m){ return { role: m.role, content: m.content }; });
  messages.push({ role: 'user', content: question });

  return callGeminiMessages(systemPrompt, messages, 800).then(function(data){
    return extractText(data).trim();
  });
}

function generateDigest(){
  var cutoff = Date.now() - 7*24*60*60*1000;
  var all = getAllNotesCached().filter(function(item){ return item.note.createdAt >= cutoff; });
  if(all.length === 0){
    return Promise.resolve({ text: "No notes from the past week yet — capture a few thoughts and check back!", count: 0 });
  }
  var listing = all.map(function(item){ return '- (' + item.path + ') ' + item.note.content + (item.note.description ? ': ' + item.note.description : ''); }).join('\n');
  var systemPrompt = 'You are reviewing someone\'s personal "second brain" notes from the past week. Write a short, warm, plain-language weekly recap in English: 3-6 sentences highlighting themes, recurring topics, and anything that looks unfinished or worth following up on. Do not just restate the list — synthesize it. No markdown headers, no preamble, just the recap text.';
  return callGemini(systemPrompt, listing, 500).then(function(data){
    return { text: extractText(data).trim(), count: all.length };
  });
}

function summarizeDescription(description){
  var systemPrompt = 'Compress the given folder description into exactly ONE short plain sentence, under 12 words, in a friendly plain-language tone. Respond with ONLY the sentence, no quotes, no preamble.';
  return callGemini(systemPrompt, description, 60).then(function(data){
    return extractText(data).trim();
  }).catch(function(){
    return description.length > 70 ? description.slice(0,70) + '…' : description;
  });
}

/* ============================================================
   LINK PREVIEW (oEmbed for known providers + generic og:image scrape)
   ============================================================ */
function decodeHtmlEntities(str){
  if(!str) return str;
  var map = { '&amp;':'&', '&lt;':'<', '&gt;':'>', '&quot;':'"', '&#39;':"'", '&apos;':"'", '&nbsp;':' ' };
  var out = str.replace(/&amp;|&lt;|&gt;|&quot;|&#39;|&apos;|&nbsp;/g, function(m){ return map[m]; });
  out = out.replace(/&#(\d+);/g, function(_, code){ return String.fromCharCode(code); });
  return out;
}

function extractOgMeta(html, baseUrl){
  function grab(re){
    var m = html.match(re);
    return m ? m[1] : null;
  }
  var image = grab(/<meta[^>]+property=["']og:image(?::secure_url)?["'][^>]+content=["']([^"']+)["']/i)
    || grab(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image(?::secure_url)?["']/i)
    || grab(/<meta[^>]+name=["']twitter:image(?::src)?["'][^>]+content=["']([^"']+)["']/i)
    || grab(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']twitter:image(?::src)?["']/i);
  var title = grab(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
    || grab(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i)
    || grab(/<title[^>]*>([^<]*)<\/title>/i);
  if(image){
    try{ image = new URL(image, baseUrl).href; }catch(e){ image = null; }
  }
  return { image: image, title: title ? decodeHtmlEntities(title.trim()) : null };
}

function faviconUrl(host){
  return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(host) + '&sz=128';
}

function fetchGenericLinkPreview(url){
  var host;
  try{ host = new URL(url).hostname.replace('www.',''); }catch(e){ host = url; }
  var proxied = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  return fetch(proxied).then(function(res){
    if(!res.ok) throw new Error('proxy fetch failed');
    return res.text();
  }).then(function(html){
    var meta = extractOgMeta(html, url);
    return {
      url: url,
      title: meta.title || host,
      thumbnail: meta.image || null,
      favicon: meta.image ? null : faviconUrl(host),
      author: host
    };
  }).catch(function(){
    return { url: url, title: host, thumbnail: null, favicon: faviconUrl(host), author: host };
  });
}

function fetchLinkPreview(url){
  var oembedUrl = null;
  var host;
  try{ host = new URL(url).hostname.replace('www.',''); }catch(e){ return Promise.resolve(null); }

  if(host === 'youtube.com' || host === 'youtu.be' || host === 'm.youtube.com'){
    oembedUrl = 'https://www.youtube.com/oembed?url=' + encodeURIComponent(url) + '&format=json';
  } else if(host === 'vimeo.com'){
    oembedUrl = 'https://vimeo.com/api/oembed.json?url=' + encodeURIComponent(url);
  } else if(host === 'twitter.com' || host === 'x.com'){
    oembedUrl = 'https://publish.twitter.com/oembed?url=' + encodeURIComponent(url);
  }

  if(oembedUrl){
    return fetch(oembedUrl).then(function(res){
      if(!res.ok) throw new Error('oembed failed');
      return res.json();
    }).then(function(data){
      return {
        url: url,
        title: data.title || url,
        thumbnail: data.thumbnail_url || null,
        favicon: data.thumbnail_url ? null : faviconUrl(host),
        author: data.author_name || host
      };
    }).catch(function(){ return fetchGenericLinkPreview(url); });
  }

  return fetchGenericLinkPreview(url);
}

function showToast(message, actionLabel, actionFn){
  var root = document.getElementById('toastRoot');
  var el = document.createElement('div');
  el.className = 'sb-toast';
  el.innerHTML = '<span>' + escapeHtml(message) + '</span>';
  if(actionLabel && actionFn){
    var btn = document.createElement('button');
    btn.textContent = actionLabel;
    btn.onclick = function(){ actionFn(); el.remove(); };
    el.appendChild(btn);
  }
  root.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.remove(); }, 4000);
}

var lastSaveSynced = null; // null = n/a (no cloud configured), true/false = outcome of last cloud attempt

function renderSaveIndicator(){
  var el = document.getElementById('saveIndicator');
  if(!el) return;
  if(saveError){
    el.textContent = 'Not saved — storage full';
    el.className = 'sb-save-indicator error';
  } else {
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    var timeStr = (h<10?'0'+h:h) + ':' + (m<10?'0'+m:m);
    if(hasCloudStorage() && lastSaveSynced === false){
      el.textContent = 'Saved on this device only · ' + timeStr;
      el.className = 'sb-save-indicator error';
    } else {
      el.textContent = 'Saved · ' + timeStr;
      el.className = 'sb-save-indicator';
    }
  }
}

function wireFolderTreeEvents(container, opts){
  opts = opts || {};
  Array.prototype.forEach.call(container.querySelectorAll('[data-toggle-folder]'), function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var f = findFolderById(btn.getAttribute('data-toggle-folder'));
      if(f){ f.expanded = !f.expanded; saveState(); if(opts.rerender) opts.rerender(); }
    });
  });
  Array.prototype.forEach.call(container.querySelectorAll('[data-add-sub]'), function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      state.pendingParentId = btn.getAttribute('data-add-sub');
      if(opts.closeAfterNav) closeMobileDrawer();
      openFolderEditModal(null);
    });
  });
  Array.prototype.forEach.call(container.querySelectorAll('.sb-folder-row'), function(row){
    row.addEventListener('click', function(){
      if(opts.closeAfterNav) closeMobileDrawer();
      navigateTo('folder', { folderId: row.getAttribute('data-folder') });
    });
    row.addEventListener('contextmenu', function(e){
      e.preventDefault();
      openFolderMenuAtPoint(e.clientX, e.clientY, row.getAttribute('data-folder'));
    });
    if(opts.draggable === false) return;
    row.addEventListener('dragover', function(e){ e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', function(){ row.classList.remove('drag-over'); });
    row.addEventListener('drop', function(e){
      e.preventDefault();
      row.classList.remove('drag-over');
      var noteData = e.dataTransfer.getData('text/sb-note');
      var folderData = e.dataTransfer.getData('text/sb-folder');
      var targetId = row.getAttribute('data-folder');
      if(noteData){
        try{
          var parsed = JSON.parse(noteData);
          moveNoteToFolder(parsed.folderId, parsed.noteId, targetId);
          showToast('Note moved.');
          renderAll();
        }catch(e){}
      } else if(folderData && folderData !== targetId){
        if(moveFolderTo(folderData, targetId)){ saveState(); renderAll(); showToast('Folder moved.'); }
      }
    });
    row.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/sb-folder', row.getAttribute('data-folder'));
    });
  });
}

function moveNoteToFolder(fromFolderId, noteId, toFolderId){
  if(fromFolderId === toFolderId) return;
  var fromF = findFolderById(fromFolderId);
  var toF = findFolderById(toFolderId);
  if(!fromF || !toF) return;
  var idx = fromF.notes.findIndex(function(n){ return n.id === noteId; });
  if(idx === -1) return;
  var note = fromF.notes[idx];
  fromF.notes.splice(idx,1);
  toF.notes.push(note);
  invalidateNotesCache();
  saveState();
}

      var url = linkInput.value.trim();

        document.getElementById('captureInput').focus();

  if(fileInput) fileInput.addEventListener('change', function(){

    var remaining = files.length;
    if(!remaining) return;
    files.forEach(function(file){
      var reader = new FileReader();
      reader.onload = function(){
        var dataUrl = reader.result;
        var base64 = dataUrl.split(',')[1];
        state.pendingImages.push({ dataUrl: dataUrl, mediaType: file.type, base64: base64 });
        remaining--;
        if(remaining === 0) renderMain();
      };
      reader.readAsDataURL(file);
    });
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-remove-image]'), function(btn){

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

var mediaRecorderInstance = null;
var mediaRecorderChunks = [];
var mediaStreamInstance = null;

function toggleVoiceCapture(){
  if(captureDraft.voiceActive){
    stopVoiceCapture();
    return;
  }
  startVoiceCapture();
}

function startVoiceCapture(){
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    showCaptureError('Voice capture needs Chrome or Edge — please type instead.');
    return;
  }
  var canRecordAudio = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && typeof MediaRecorder !== 'undefined');
  if(!canRecordAudio){
    showCaptureError('Recording audio isn\'t supported in this browser — using dictation only.');
    beginSpeechRecognition();
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
    mediaStreamInstance = stream;
    mediaRecorderChunks = [];
    var mimeType = (typeof MediaRecorder.isTypeSupported === 'function' && MediaRecorder.isTypeSupported('audio/webm')) ? 'audio/webm' : '';
    mediaRecorderInstance = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
    mediaRecorderInstance.ondataavailable = function(e){ if(e.data && e.data.size > 0) mediaRecorderChunks.push(e.data); };
    mediaRecorderInstance.onstop = function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      if(mediaRecorderChunks.length){
        var blob = new Blob(mediaRecorderChunks, { type: mediaRecorderInstance.mimeType || 'audio/webm' });
        var reader = new FileReader();
        reader.onload = function(){
          state.pendingVoiceNote = { dataUrl: reader.result, mime: blob.type };
          renderMain();
        };
        reader.readAsDataURL(blob);
      }
    };
    mediaRecorderInstance.start();
    beginSpeechRecognition();
  }).catch(function(){
    showCaptureError('Microphone access was blocked — allow it in your browser to record voice notes.');
  });
}

function beginSpeechRecognition(){
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognitionInstance = new SpeechRecognition();
  recognitionInstance.lang = navigator.language || 'en-US';
  recognitionInstance.continuous = true;
  recognitionInstance.interimResults = true;
  var baseText = captureDraft.text ? captureDraft.text + ' ' : '';
  recognitionInstance.onresult = function(event){
    var transcript = '';
    for(var i=0;i<event.results.length;i++){
      transcript += event.results[i][0].transcript;
    }
    captureDraft.text = baseText + transcript;
    var ta = document.getElementById('captureInput');
    if(ta){ ta.value = captureDraft.text; autoResize(ta); }
  };
  recognitionInstance.onerror = function(){ if(captureDraft.voiceActive) stopVoiceCapture(); };
  recognitionInstance.onend = function(){ if(captureDraft.voiceActive) stopVoiceCapture(); };
  captureDraft.voiceActive = true;
  renderMain();
  recognitionInstance.start();
}

function stopVoiceCapture(){
  if(recognitionInstance){ try{ recognitionInstance.stop(); }catch(e){} }
  if(mediaRecorderInstance && mediaRecorderInstance.state !== 'inactive'){
    try{ mediaRecorderInstance.stop(); }catch(e){}
  }
  captureDraft.voiceActive = false;
  renderMain();
}
