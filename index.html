function handleFileClick(){
  var text = captureDraft.text.trim();
  var linkUrl = captureDraft.linkMode ? captureDraft.linkUrl.trim() : '';
  if(!text && !linkUrl && state.pendingImages.length === 0 && !state.pendingVoiceNote){
    showCaptureError('Write something, add a link, attach an image, or record a voice note first.');
    return;
  }
  var fullText = text;
  if(linkUrl){
    var normalized = /^https?:\/\//i.test(linkUrl) ? linkUrl : 'https://' + linkUrl;
    fullText = (fullText ? fullText + '\n' : '') + 'Link: ' + normalized;
  }
  if(!fullText) fullText = state.pendingLinkPreview ? ('Link: ' + state.pendingLinkPreview.url) : (state.pendingVoiceNote ? 'Voice memo' : 'Untitled note');

  var btn = document.getElementById('btnFile');
  if(btn){ btn.disabled = true; btn.textContent = 'Filing…'; }
  showCaptureError('');

  classify(fullText, state.pendingImages).then(function(items){
    state.pendingReview = items.map(function(item, idx){
      var existing = findFolderByName(item.folder);
      var dup = findPossibleDuplicate(item.text);
      return {
        note: createNote(item.text, {
          image: idx === 0 && state.pendingImages[0] ? state.pendingImages[0].dataUrl : null,
          images: idx === 0 ? state.pendingImages.map(function(i){ return i.dataUrl; }) : [],
          linkPreview: idx === 0 ? state.pendingLinkPreview : null,
          voiceNote: idx === 0 ? state.pendingVoiceNote : null,
          description: item.description || '',
          priority: item.priority || 'medium',
          dueDate: item.dueDate || ''
        }),
        reasoning: item.reasoning || '',
        suggestedName: item.isNew ? item.folder : '',
        suggestedDesc: item.newFolderDescription || '',
        suggestedDueDate: item.dueDate || '',
        suggestedPriority: item.priority || 'medium',
        existingFolderId: existing ? existing.id : null,
        isNewSuggestion: !!item.isNew && !existing,
        duplicate: dup
      };
    });
    resetCaptureDraft();
    renderMain();
  }).catch(function(err){
    console.error(err);
    if(btn){ btn.disabled = false; btn.textContent = 'File'; }
    showCaptureError('AI request failed: ' + err.message + '. Please try again.');
  });
}

function fileAllReviewItems(){
  var entries = [];
  var createdFolderIds = [];
  var newFolderCache = {};

  state.pendingReview.forEach(function(item){
    var targetFolder = null;
    if(item.isNewSuggestion){
      var name = (item.suggestedName || 'Untitled').trim();
      var key = name.toLowerCase();
      if(newFolderCache[key]){
        targetFolder = newFolderCache[key];
      } else {
        var existing = findFolderByName(name);
        if(existing){
          targetFolder = existing;
        } else {
          targetFolder = createFolder(name, { description: item.suggestedDesc || '' });
          state.folders.push(targetFolder);
          createdFolderIds.push(targetFolder.id);
        }
        newFolderCache[key] = targetFolder;
      }
    } else if(item.existingFolderId){
      targetFolder = findFolderById(item.existingFolderId);
    }
    if(!targetFolder){
      targetFolder = findFolderByName('Uncategorized');
      if(!targetFolder){
        targetFolder = createFolder('Uncategorized', { description:'Notes filed without a chosen folder.' });
        state.folders.push(targetFolder);
        createdFolderIds.push(targetFolder.id);
      }
    }
    if(folderIsTaskList(targetFolder)){
      item.note.priority = item.suggestedPriority || 'medium';
      item.note.dueDate = item.suggestedDueDate || '';
      if(item.note._recurrence) item.note.recurrence = item.note._recurrence;
    }
    if(item._recurrence) item.note.recurrence = item._recurrence;
    targetFolder.notes.push(item.note);
    entries.push({ folderId: targetFolder.id, noteId: item.note.id });
  });

  state.lastFiled = { entries: entries, createdFolderIds: createdFolderIds };
  state.pendingReview = [];
  invalidateNotesCache();
  saveState();
  renderAll();
  showToast(entries.length + (entries.length === 1 ? ' note filed.' : ' notes filed.'), 'Undo', undoLastFile);
}

function undoLastFile(){
  if(!state.lastFiled) return;
  state.lastFiled.entries.forEach(function(e){
    var folder = findFolderById(e.folderId);
    if(!folder) return;
    var idx = folder.notes.findIndex(function(n){ return n.id === e.noteId; });
    if(idx !== -1) folder.notes.splice(idx,1);
  });
  state.lastFiled.createdFolderIds.forEach(function(fid){
    var loc = locateFolder(fid);
    if(loc && loc.arr[loc.index].notes.length === 0 && loc.arr[loc.index].subfolders.length === 0){
      loc.arr.splice(loc.index,1);
    }
  });
  state.lastFiled = null;
  invalidateNotesCache();
  saveState();
  renderAll();
}

function wireSearchEvents(){
  var input = document.getElementById('searchInput');
  if(!input) return;
  var resultsBox = document.getElementById('searchResults');

  var doInstant = debounce(function(q){
    if(q.trim().length < 2){ resultsBox.innerHTML=''; return; }
    var matches = instantSearch(q.trim());
    renderSearchDropdown(matches);
  }, 120);

  input.addEventListener('input', function(){
    searchDraft = input.value;
    doInstant(searchDraft);
  });
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      var q = input.value.trim();
      if(!q) return;
      resultsBox.innerHTML = '<div class="sb-search-dropdown"><div class="sb-search-item"><span class="si-title">Searching…</span></div></div>';
      runSearchAI(q).then(function(result){
        if(result.type === 'note'){
          var loc = findNoteLocation(result.id);
          if(loc){ navigateTo('folder', { folderId: loc.folder.id }); setTimeout(function(){ flashNote(result.id); }, 80); resultsBox.innerHTML=''; return; }
        } else if(result.type === 'folder'){
          var f = findFolderById(result.id);
          if(f){ navigateTo('folder', { folderId: f.id }); resultsBox.innerHTML=''; return; }
        }
        resultsBox.innerHTML = '<div class="sb-search-dropdown"><div class="sb-search-item"><span class="si-title">No match found</span></div></div>';
      }).catch(function(err){
        resultsBox.innerHTML = '<div class="sb-search-dropdown"><div class="sb-search-item"><span class="si-title">Search failed: ' + escapeHtml(err.message) + '</span></div></div>';
      });
    } else if(e.key === 'Escape'){
      resultsBox.innerHTML = '';
      input.blur();
    }
  });
  document.addEventListener('click', function closeOnOutside(e){
    if(!input.contains(e.target) && !resultsBox.contains(e.target)){
      resultsBox.innerHTML = '';
    }
  }, { once:true });
}

function instantSearch(q){
  var out = [];
  flattenFolders().forEach(function(item){
    var hay = item.folder.name + ' ' + (item.folder.description||'') + ' ' + (item.folder.summary||'');
    if(fuzzyIncludes(hay, q)) out.push({ type:'folder', folder:item.folder, path:item.path });
  });
  getAllNotesCached().forEach(function(item){
    var hay = item.note.content + ' ' + (item.note.description||'') + ' ' + item.folder.name;
    if(fuzzyIncludes(hay, q)) out.push({ type:'note', note:item.note, folder:item.folder, path:item.path });
  });
  return out.slice(0, 8);
}

function renderSearchDropdown(matches){
  var resultsBox = document.getElementById('searchResults');
  if(!matches.length){ resultsBox.innerHTML = '<div class="sb-search-dropdown"><div class="sb-search-item"><span class="si-title">No matches</span></div></div>'; return; }
  var html = '<div class="sb-search-dropdown">';
  matches.forEach(function(m, i){
    if(m.type === 'folder'){
      html += '<div class="sb-search-item" data-result-index="' + i + '"><span class="si-title">📁 ' + escapeHtml(m.folder.name) + '</span><span class="si-meta">' + escapeHtml(m.path) + '</span></div>';

      html += '<div class="sb-search-item" data-result-index="' + i + '"><span class="si-title">' + escapeHtml(m.note.content.slice(0,60)) + '</span><span class="si-meta">in ' + escapeHtml(m.path) + '</span></div>';
    }
  });
  html += '</div>';
  resultsBox.innerHTML = html;
  Array.prototype.forEach.call(resultsBox.querySelectorAll('[data-result-index]'), function(el){
    el.addEventListener('click', function(){
      jumpToSearchResult(matches[Number(el.getAttribute('data-result-index'))]);
    });
  });
}

function jumpToSearchResult(m){
  document.getElementById('searchResults').innerHTML = '';

    navigateTo('folder', { folderId: m.folder.id });

    navigateTo('folder', { folderId: m.folder.id });
    setTimeout(function(){ flashNote(m.note.id); }, 80);
  }
}

function renderNoteCard(note, folder, opts){
  opts = opts || {};

  var today = todayISO();
  var overdue = isTask && note.dueDate && !note.done && note.dueDate < today;
  var classes = 'sb-note' + (note.pinned ? ' pinned' : '');
  var html = '<div class="' + classes + '" data-note-id="' + note.id + '" data-folder-id="' + folder.id + '" draggable="true">';
  html += '<div class="sb-note-top">';

  if(state.selectMode){
    var key = folder.id + '::' + note.id;
    html += '<input type="checkbox" class="sb-note-select" data-select-key="' + key + '" ' + (state.selected[key] ? 'checked' : '') + ' style="margin-top:4px;width:16px;height:16px;">';
  } else if(isTask){
    html += '<button class="sb-note-check' + (note.done ? ' done' : '') + '" data-toggle-done="1">' + (note.done ? '✓' : '') + '</button>';
  } else {
    html += '<button class="sb-note-check" data-toggle-pin="1" title="Pin" style="border:none;background:none;font-size:14px;color:' + (note.pinned ? 'var(--accent)' : 'var(--text-tertiary)') + ';width:20px;">' + (note.pinned ? '📌' : '') + '</button>';
  }

  html += '<div class="sb-note-body">';
  html += '<div class="sb-note-content' + (note.done ? ' done' : '') + '" data-toggle-desc="1">' + linkifyWiki(note.content) + '</div>';

  html += '<div class="sb-note-meta">';
  html += '<span class="sb-note-time">' + escapeHtml(note.time) + '</span>';
  if(isTask && note.priority) html += '<span class="sb-badge-priority ' + note.priority + '">' + note.priority + '</span>';
  if(isTask && note.dueDate) html += '<span class="sb-badge-due' + (overdue ? ' overdue' : '') + '">' + (overdue ? 'Overdue · ' : '') + escapeHtml(note.dueDate) + '</span>';
  if(note.recurrence) html += '<span class="sb-badge-due">🔁 ' + note.recurrence + '</span>';
  if(!opts.hideFolder) html += '<span class="sb-note-time" data-folder-jump="' + folder.id + '" style="cursor:pointer;">in ' + escapeHtml(folder.name) + '</span>';
  html += '</div>';

  html += renderNoteDescBlock(note);

  if(opts.expanded){
    if(note.images && note.images.length){
      html += '<div class="sb-note-gallery">';
      note.images.forEach(function(img){ html += '<img src="' + img + '">'; });
      html += '</div>';
    }
    html += renderNoteLinkChip(note);
    html += renderNoteVoiceChip(note);
  } else {
    if(note.images && note.images.length){
      html += '<div class="sb-note-gallery">';
      note.images.slice(0,4).forEach(function(img){ html += '<img src="' + img + '">'; });
      html += '</div>';
    }
    html += renderNoteLinkChip(note);
    html += renderNoteVoiceChip(note);
  }

  html += '</div>'; // body

  if(!state.selectMode){
    html += '<div class="sb-note-actions"><button class="sb-note-menu-btn" data-note-menu="1">⋯</button></div>';
  }

  html += '</div>'; // top
  html += '</div>'; // note
  return html;
}

var brainChatMessages = [];
var brainChatLoading = false;
var brainChatShouldFocus = false;

function renderBrainChat(){
  var html = '<div class="sb-brainchat">';
  html += '<div class="sb-brainchat-head"><h3>✨ Ask your second brain</h3>';
  if(brainChatMessages.length) html += '<button class="sb-btn-text" id="brainChatClear">Clear</button>';
  html += '</div>';
  html += '<div class="sb-brainchat-messages" id="brainChatMessages">';
  if(!brainChatMessages.length && !brainChatLoading){
    html += '<div class="sb-brainchat-empty">Ask anything about what you\'ve saved — "summarize my reading list", "how many tasks are overdue", "what have I saved about Lisbon"…</div>';
  } else {
    brainChatMessages.forEach(function(m){
      html += '<div class="sb-brainchat-msg ' + m.role + '">' + escapeHtml(m.content).replace(/\n/g,'<br>') + '</div>';
    });
    if(brainChatLoading){
      html += '<div class="sb-brainchat-msg assistant loading"><span></span><span></span><span></span></div>';
    }
  }
  html += '</div>';
  html += '<div class="sb-brainchat-input-row">';
  html += '<input type="text" id="brainChatInput" placeholder="Ask anything about your notes…">';
  html += '<button class="sb-btn-cta" id="brainChatSend"' + (brainChatLoading ? ' disabled' : '') + '>Ask</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function wireBrainChatEvents(){
  var input = document.getElementById('brainChatInput');
  var sendBtn = document.getElementById('brainChatSend');
  var msgBox = document.getElementById('brainChatMessages');
  if(!input) return;
  if(msgBox) msgBox.scrollTop = msgBox.scrollHeight;
  if(brainChatShouldFocus){ input.focus(); brainChatShouldFocus = false; }
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); sendBrainChatMessage(input.value); }
  });
  if(sendBtn) sendBtn.addEventListener('click', function(){ sendBrainChatMessage(input.value); });
  var clearBtn = document.getElementById('brainChatClear');
  if(clearBtn) clearBtn.addEventListener('click', function(){ brainChatMessages = []; renderMain(); });
}

function sendBrainChatMessage(text){
  text = (text || '').trim();
  if(!text || brainChatLoading) return;
  var history = brainChatMessages.slice();
  brainChatMessages.push({ role:'user', content: text });
  brainChatLoading = true;
  brainChatShouldFocus = true;
  renderMain();
  askBrainAI(text, history).then(function(answer){
    brainChatMessages.push({ role:'assistant', content: answer || "I couldn't come up with an answer for that." });
    brainChatLoading = false;
    brainChatShouldFocus = true;
    renderMain();
  }).catch(function(err){
    brainChatMessages.push({ role:'assistant', content: "Couldn't reach the AI: " + err.message });
    brainChatLoading = false;
    brainChatShouldFocus = true;
    renderMain();
  });
}

function getOnThisDay(){
  var all = getAllNotesCached();
  var targets = [isoDaysAgo(7), isoDaysAgo(30), isoDaysAgo(365)];
  return all.filter(function(item){
    var d = todayISO(new Date(item.note.createdAt));
    return targets.indexOf(d) !== -1;
  });
}

function getUpcoming(){
  var tasks = getAllTasks().filter(function(item){ return !item.note.done && item.note.dueDate; });
  tasks.sort(function(a,b){ return a.note.dueDate < b.note.dueDate ? -1 : 1; });
  return tasks.slice(0,6);
}

   VIEW: FOLDER
   ============================================================ */
function renderFolderView(){
  var folder = findFolderById(state.selectedFolderId);
  if(!folder){
    return emptyState('📁','Folder not found','It may have been deleted.');
  }
  var html = '<div class="sb-page-head">';
  html += '<div><div class="sb-page-title"><span>' + folderIconSvg(folder.icon, 22) + '</span>' + escapeHtml(folder.name) + (folder.color ? ' <span class="sb-folder-dot" style="background:' + folder.color + '"></span>' : '') + '</div>';
  if(folder.summary) html += '<div class="sb-page-desc">' + escapeHtml(folder.summary) + '</div>';
  html += '</div>';
  html += '<div class="sb-page-actions">';
  html += '<button data-folder-print="1">🖨 Print</button>';
  html += '<button data-folder-edit="' + folder.id + '">✎ Edit</button>';
  html += '<button data-folder-move="' + folder.id + '">↪ Move</button>';
  html += '<button data-folder-merge="' + folder.id + '">🔀 Merge</button>';
  html += '<button data-folder-delete="' + folder.id + '">🗑 Delete</button>';
  html += '<button data-select-mode="1">' + (state.selectMode ? 'Cancel' : '☑ Select') + '</button>';
  html += '</div></div>';

  if(folder.subfolders.length){
    html += '<div class="sb-section"><div class="sb-section-head"><h3>Subfolders</h3></div><div class="sb-folder-grid">';
    folder.subfolders.forEach(function(sf){ html += renderFolderTile(sf); });
    html += '</div></div>';
  }

  html += '<div class="sb-section"><div class="sb-section-head"><h3>Notes</h3>' + (folderIsTaskList(folder) ? renderTaskSortSelect() : '') + '</div>';
  var notes = folder.notes.slice().sort(function(a,b){
    if(!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
    return b.createdAt - a.createdAt;
  });
  if(folderIsTaskList(folder)){
    if(state.taskSortOrder === 'priority-desc' || state.taskSortOrder === 'priority-asc'){
      var dir = state.taskSortOrder === 'priority-desc' ? 'desc' : 'asc';
      notes.sort(function(a,b){
        if(!!a.done !== !!b.done) return a.done ? 1 : -1;
        if(!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
        return comparePriority(a, b, dir);
      });
    } else {
      notes.sort(function(a,b){
        if(!!a.done !== !!b.done) return a.done ? 1 : -1;
        if(!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
        var da = a.dueDate || '9999', db = b.dueDate || '9999';
        return da < db ? -1 : da > db ? 1 : 0;
      });
    }
  }
  if(!notes.length){
    html += emptyState('📭','No notes yet','Capture something and file it here.');
  } else {
    html += '<div class="sb-note-list">';
    notes.forEach(function(n){ html += renderNoteCard(n, folder, { expanded: n.id === expandedNoteId, hideFolder:true }); });
    html += '</div>';
  }
  html += '</div>';

  var backlinks = getBacklinks(folder.name);
  if(backlinks.length){
    html += '<div class="sb-section"><div class="sb-section-head"><h3>Linked mentions</h3></div><div class="sb-note-list">';
    backlinks.forEach(function(item){ html += renderNoteCard(item.note, item.folder, { expanded:item.note.id === expandedNoteId }); });
    html += '</div></div>';
  }

  return html;
}

function getBacklinks(folderName){
  var all = getAllNotesCached();
  var pattern = '[[' + folderName + ']]';
  return all.filter(function(item){
    return (item.note.content && item.note.content.indexOf(pattern) !== -1) ||
           (item.note.description && item.note.description.indexOf(pattern) !== -1);
  });
}

function renderTasksView(){
  var html = '<div class="sb-page-head"><div class="sb-page-title">✓ Tasks</div>';
  html += '<div class="sb-page-actions">' + renderTaskSortSelect() + '</div></div>';

  if(state.taskSortOrder === 'priority-desc' || state.taskSortOrder === 'priority-asc'){
    var order = state.taskSortOrder === 'priority-desc' ? ['high','medium','low','completed'] : ['low','medium','high','completed'];
    var labels = { high:'High priority', medium:'Medium priority', low:'Low priority', completed:'Completed' };
    var buckets2 = computeTaskBucketsByPriority();
    var any2 = false;
    order.forEach(function(key){
      var items = buckets2[key];
      if(!items.length) return;
      any2 = true;
      html += '<div class="sb-task-bucket"><div class="sb-task-bucket-head"><h4>' + labels[key] + '</h4><span class="sb-task-bucket-count">' + items.length + '</span></div>';
      html += '<div class="sb-note-list">';
      items.forEach(function(item){ html += renderNoteCard(item.note, item.folder, { expanded: item.note.id === expandedNoteId }); });
      html += '</div></div>';
    });
    if(!any2) html += emptyState('✓','No tasks yet','Tasks you file into To Do or To Buy show up here.');
    return html;
  }

  var buckets = computeTaskBuckets();
  var defs = [
    { key:'overdue', label:'Overdue', cls:'overdue' },
    { key:'today', label:'Today' },
    { key:'week', label:'This week' },
    { key:'later', label:'Later' },
    { key:'none', label:'No due date' },
    { key:'completed', label:'Completed' }
  ];
  var any = false;
  defs.forEach(function(d){
    var items = buckets[d.key];
    if(!items.length) return;
    any = true;
    html += '<div class="sb-task-bucket"><div class="sb-task-bucket-head' + (d.cls ? ' '+d.cls : '') + '"><h4>' + d.label + '</h4><span class="sb-task-bucket-count">' + items.length + '</span></div>';
    html += '<div class="sb-note-list">';
    items.forEach(function(item){ html += renderNoteCard(item.note, item.folder, { expanded: item.note.id === expandedNoteId }); });
    html += '</div></div>';
  });
  if(!any) html += emptyState('✓','No tasks yet','Tasks you file into To Do or To Buy show up here.');
  return html;
}

/* ---------- Note card events (shared across views) ---------- */
function wireNoteCardEvents(){
  Array.prototype.forEach.call(document.querySelectorAll('.sb-note[data-note-id]'), function(card){
    var noteId = card.getAttribute('data-note-id');
    var folderId = card.getAttribute('data-folder-id');

    card.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/sb-note', JSON.stringify({ noteId: noteId, folderId: folderId }));
    });

    card.addEventListener('contextmenu', function(e){
      if(state.selectMode) return;
      if(e.target.closest('button, a, textarea, input, .sb-wiki-link')) return;
      e.preventDefault();
      openNoteMenuAtPoint(e.clientX, e.clientY, noteId, folderId);
    });

    var toggleDone = card.querySelector('[data-toggle-done]');
    if(toggleDone) toggleDone.addEventListener('click', function(e){
      e.stopPropagation();
      toggleTaskDone(folderId, noteId);
      renderAll();
    });
    var togglePin = card.querySelector('[data-toggle-pin]');
    if(togglePin) togglePin.addEventListener('click', function(e){
      e.stopPropagation();
      var folder = findFolderById(folderId);
      var note = folder.notes.find(function(n){ return n.id===noteId; });
      note.pinned = !note.pinned;
      saveState(); renderAll();
    });

    var content = card.querySelector('[data-toggle-desc]');
    if(content){
      content.addEventListener('click', function(){
        expandedNoteId = (expandedNoteId === noteId) ? null : noteId;
        renderMain();
      });
    }

    var folderJump = card.querySelector('[data-folder-jump]');
    if(folderJump) folderJump.addEventListener('click', function(e){
      e.stopPropagation();
      navigateTo('folder', { folderId: folderJump.getAttribute('data-folder-jump') });
    });

    var menuBtn = card.querySelector('[data-note-menu]');
    if(menuBtn) menuBtn.addEventListener('click', function(e){
      e.stopPropagation();
      openNoteMenu(menuBtn, noteId, folderId);
    });

    var selectCb = card.querySelector('[data-select-key]');
    if(selectCb) selectCb.addEventListener('change', function(){
      var key = selectCb.getAttribute('data-select-key');
      if(selectCb.checked) state.selected[key] = true; else delete state.selected[key];
      renderBulkBar();
    });

    Array.prototype.forEach.call(card.querySelectorAll('.sb-wiki-link'), function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        navigateTo('folder', { folderId: el.getAttribute('data-wiki-folder') });
      });
    });

    Array.prototype.forEach.call(card.querySelectorAll('.sb-note-gallery img'), function(img){
      img.addEventListener('click', function(e){ e.stopPropagation(); window.open(img.src, '_blank'); });
    });
  });
}

/* ---------- Generic floating context menu ---------- */
var floatingMenuCleanups = {};

function buildFloatingMenuEl(menuId, items, onSelect){
  var menu = document.createElement('div');
  menu.id = menuId;
  menu.style.cssText = 'position:fixed;background:var(--bg-elevated);border:1px solid var(--separator);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);padding:6px;z-index:150;min-width:170px;';
  menu.innerHTML = items.map(function(it){
    return '<button data-menu-action="' + it.action + '" style="display:block;width:100%;text-align:left;background:none;border:none;padding:8px 10px;border-radius:8px;font-size:13px;color:' + (it.danger ? 'var(--danger)' : 'var(--text)') + ';">' + it.label + '</button>';
  }).join('');
  menu.style.visibility = 'hidden';
  document.body.appendChild(menu);
  Array.prototype.forEach.call(menu.querySelectorAll('button'), function(btn){
    btn.addEventListener('mouseenter', function(){ btn.style.background = 'var(--overlay-2)'; });
    btn.addEventListener('mouseleave', function(){ btn.style.background = 'none'; });
    btn.addEventListener('click', function(){
      var action = btn.getAttribute('data-menu-action');
      closeFloatingMenu(menuId);
      onSelect(action);
    });
  });
  function onDocMouseDown(e){
    if(!menu.contains(e.target)) closeFloatingMenu(menuId);
  }
  function onDocContextMenu(e){
    if(!menu.contains(e.target)) closeFloatingMenu(menuId);
  }
  setTimeout(function(){
    document.addEventListener('mousedown', onDocMouseDown);
    document.addEventListener('contextmenu', onDocContextMenu);
  }, 0);
  floatingMenuCleanups[menuId] = function(){
    document.removeEventListener('mousedown', onDocMouseDown);
    document.removeEventListener('contextmenu', onDocContextMenu);
  };
  return menu;
}

function openFloatingMenu(anchorEl, menuId, items, onSelect){
  closeFloatingMenu(menuId);
  var rect = anchorEl.getBoundingClientRect();
  var menu = buildFloatingMenuEl(menuId, items, onSelect);
  var menuH = menu.offsetHeight, menuW = menu.offsetWidth;
  var top = rect.bottom + 6;
  if(top + menuH > window.innerHeight - 8) top = Math.max(8, rect.top - menuH - 6);
  var left = Math.max(8, Math.min(rect.right - menuW, window.innerWidth - menuW - 8));
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  menu.style.visibility = 'visible';
}

function openFloatingMenuAtPoint(x, y, menuId, items, onSelect){
  closeFloatingMenu(menuId);
  var menu = buildFloatingMenuEl(menuId, items, onSelect);
  var menuH = menu.offsetHeight, menuW = menu.offsetWidth;
  var top = Math.max(8, Math.min(y, window.innerHeight - menuH - 8));
  var left = Math.max(8, Math.min(x, window.innerWidth - menuW - 8));
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';
  menu.style.visibility = 'visible';
}

function closeFloatingMenu(menuId){
  var m = document.getElementById(menuId);
  if(m) m.remove();
  if(floatingMenuCleanups[menuId]){
    floatingMenuCleanups[menuId]();
    delete floatingMenuCleanups[menuId];
  }
}
function closeAllFloatingMenus(){
  closeFloatingMenu('floatingNoteMenu');
  closeFloatingMenu('floatingFolderMenu');
  closeFloatingMenu('floatingEmptyAreaMenu');
}

function handleNoteMenuAction(action, note, folder){
  if(action === 'pin'){

  if(action === 'edit'){ openEditTextModal(note, folder); return; }

  if(action === 'move'){ openNoteMoveModal(note, folder); return; }

    openConfirmModal('Delete this note?', 'It will move to Trash.', function(){
      deleteNoteSoft(folder.id, note.id);
      invalidateNotesCache(); saveState(); renderAll();
      showToast('Note moved to Trash.');

  }
}

function openLinkEditModal(note, folder){
  var existing = note.linkPreview;
  var html = '<h2>' + (existing ? 'Edit link' : 'Add link') + '</h2>' +
    '<div class="sb-field"><label>Product or page URL</label><input type="text" id="noteLinkInput" class="sb-link-input" placeholder="Paste a URL…" value="' + escapeHtml(existing ? existing.url : '') + '"></div>' +
    '<div id="noteLinkPreviewSlot"></div>' +
    '<div class="sb-modal-foot">' +
      (existing ? '<button class="sb-btn-text" id="noteLinkRemove" style="color:var(--danger);margin-right:auto;">Remove link</button>' : '') +
      '<button class="sb-btn-text" id="noteLinkCancel">Cancel</button>' +
      '<button class="sb-btn-cta" id="noteLinkSave">Save</button>' +
    '</div>';
  var el = openModal(html);
  var currentPreview = existing || null;

  function renderSlot(){
    var slot = el.querySelector('#noteLinkPreviewSlot');
    if(!currentPreview){ slot.innerHTML = ''; return; }
    var lp = currentPreview;
    slot.innerHTML = '<div class="sb-link-preview"><div class="lp-text"><div class="lp-title">' + escapeHtml(lp.title) + '</div><div class="lp-sub">' + escapeHtml(lp.author || lp.url) + '</div></div></div>';
  }
  renderSlot();

  var input = el.querySelector('#noteLinkInput');
  var lastFetchedUrl = existing ? existing.url : null;

  function fetchAndShow(){
    var url = input.value.trim();
    if(!url){ currentPreview = null; lastFetchedUrl = null; renderSlot(); return; }
    if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
    if(url === lastFetchedUrl) return;
    currentPreview = { url: url, title: 'Fetching preview…', thumbnail: null, favicon: null, author: '', loading: true };
    renderSlot();
    fetchLinkPreview(url).then(function(preview){
      currentPreview = preview || { url: url, title: url, thumbnail: null, favicon: null, author: '' };
      lastFetchedUrl = url;
      renderSlot();
    });
  }
  input.addEventListener('blur', fetchAndShow);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); fetchAndShow(); } });

  el.querySelector('#noteLinkCancel').addEventListener('click', closeModal);
  var removeBtn = el.querySelector('#noteLinkRemove');
  if(removeBtn) removeBtn.addEventListener('click', function(){
    note.linkPreview = null;
    saveState(); renderAll(); closeModal();
    showToast('Link removed.');
  });
  el.querySelector('#noteLinkSave').addEventListener('click', function(){
    var url = input.value.trim();
    if(!url){
      note.linkPreview = null;
      saveState(); renderAll(); closeModal();
      return;
    }
    if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
    if(currentPreview && currentPreview.url === url && !currentPreview.loading){
      note.linkPreview = currentPreview;
      saveState(); renderAll(); closeModal();
      showToast('Link added.');
    } else {
      fetchLinkPreview(url).then(function(preview){
        note.linkPreview = preview || { url: url, title: url, thumbnail: null, favicon: null, author: '' };
        saveState(); renderAll(); closeModal();
        showToast('Link added.');
      });
    }
  });
}

  var el = openModal(html);
  var selectedIcon = icon, selectedColor = color;

  Array.prototype.forEach.call(el.querySelectorAll('[data-emoji]'), function(btn){
    btn.addEventListener('click', function(){
      selectedIcon = btn.getAttribute('data-emoji');
      Array.prototype.forEach.call(el.querySelectorAll('[data-emoji]'), function(b){ b.classList.toggle('sel', b===btn); });
    });
  });
  Array.prototype.forEach.call(el.querySelectorAll('[data-color]'), function(btn){

      selectedColor = btn.getAttribute('data-color') || null;
      Array.prototype.forEach.call(el.querySelectorAll('[data-color]'), function(b){ b.classList.toggle('sel', b===btn); });
    });
  });
  var toggle = el.querySelector('#taskListToggle');
  toggle.addEventListener('click', function(){ toggle.classList.toggle('on'); });

  el.querySelector('#folderEditCancel').addEventListener('click', function(){ state.pendingParentId = null; closeModal(); });
  el.querySelector('#folderEditSave').addEventListener('click', function(){
    var name = el.querySelector('#folderNameInput').value.trim();
    if(!name) return;
    var desc = el.querySelector('#folderDescInput').value.trim();
    var taskListOn = toggle.classList.contains('on');

    function finish(summary){
      if(isNew){
        var nf = createFolder(name, { icon:selectedIcon, color:selectedColor, description:desc, summary:summary, taskList:taskListOn });
        if(state.pendingParentId){
          var parent = findFolderById(state.pendingParentId);
          if(parent){ parent.subfolders.push(nf); parent.expanded = true; }
          else state.folders.push(nf);
        } else {
          state.folders.push(nf);
        }
        state.pendingParentId = null;
      } else {
        folder.name = name;
        folder.icon = selectedIcon;
        folder.color = selectedColor;
        folder.description = desc;
        folder.summary = summary;
        folder.taskList = taskListOn;
      }
      saveState(); renderAll(); closeModal();
    }

    if(desc.length > 70){
      summarizeDescription(desc).then(finish).catch(function(){ finish(desc.slice(0,70) + '…'); });
    } else {
      finish(desc || name);
    }
  });
}

  var el = openModal(

    '<div class="sb-field"><label>New parent</label><select class="sb-select" id="folderMoveSelect" style="width:100%;">' + options + '</select></div>' +
    '<div class="sb-modal-foot"><button class="sb-btn-text" id="fmCancel">Cancel</button><button class="sb-btn-cta" id="fmSave">Move</button></div>'
  );
  el.querySelector('#fmCancel').addEventListener('click', closeModal);
  el.querySelector('#fmSave').addEventListener('click', function(){
    var targetId = el.querySelector('#folderMoveSelect').value || null;
    if(moveFolderTo(folderId, targetId)){ saveState(); renderAll(); showToast('Folder moved.'); }
    else showToast('Could not move folder there.');
    closeModal();
  });
}

function openFolderMergeModal(folderId){
  var folder = findFolderById(folderId);
  var flat = flattenFolders().filter(function(f){ return f.folder.id !== folderId; });
  var options = flat.map(function(f){ return '<option value="' + f.folder.id + '">' + escapeHtml(f.path) + '</option>'; }).join('');
  var el = openModal(
    '<h2>Merge "' + escapeHtml(folder.name) + '" into…</h2>' +
    '<p style="color:var(--text-secondary);font-size:var(--fs-sm);">Notes and subfolders move into the target folder, and this folder is removed.</p>' +
    '<div class="sb-field"><label>Target folder</label><select class="sb-select" id="folderMergeSelect" style="width:100%;">' + options + '</select></div>' +
    '<div class="sb-modal-foot"><button class="sb-btn-text" id="fmgCancel">Cancel</button><button class="sb-btn-cta" id="fmgSave" style="background:var(--danger);">Merge</button></div>'
  );
  el.querySelector('#fmgCancel').addEventListener('click', closeModal);
  el.querySelector('#fmgSave').addEventListener('click', function(){
    var targetId = el.querySelector('#folderMergeSelect').value;
    if(mergeFolderInto(folderId, targetId)){
      saveState(); navigateTo('folder', { folderId: targetId }); showToast('Folders merged.');
    } else showToast('Could not merge.');
    closeModal();
  });
}

  html += '<p style="font-size:var(--fs-xs);color:var(--text-secondary);margin-bottom:8px;">Free, no credit card needed. Get one at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="color:var(--accent);">aistudio.google.com/apikey</a>.</p>';

  ['light','dark','system'].forEach(function(t){
    html += '<option value="' + t + '"' + (s.theme===t?' selected':'') + '>' + t.charAt(0).toUpperCase()+t.slice(1) + '</option>';
  });
  html += '</select></div>';

  html += '<div class="sb-sep"></div>';

  html += '<p style="font-size:var(--fs-xs);color:var(--text-secondary);margin-bottom:8px;">Uses a free <a href="https://jsonbin.io" target="_blank" rel="noopener" style="color:var(--accent);">JSONBin.io</a> account as shared storage. Your notes will be stored on their servers, not just this device.</p>';
  html += '<input type="password" id="syncApiKey" placeholder="JSONBin Master API Key" value="' + escapeHtml(s.syncApiKey || '') + '" style="margin-bottom:8px;">';
  html += '<input type="text" id="syncBinId" placeholder="Sync Bin ID (leave empty to create one)" value="' + escapeHtml(s.syncBinId || '') + '">';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">';
  html += '<button type="button" class="sb-btn-secondary" id="btnCreateSyncBin">Create new sync bin</button>';
  html += '<button type="button" class="sb-btn-secondary" id="btnSyncNow">Sync now</button>';
  html += '</div>';
  html += '<p id="syncStatus" style="font-size:var(--fs-xs);color:var(--text-secondary);margin-top:8px;">' + (s.syncBinId ? (s.lastSyncAt ? 'Last synced: ' + formatTime(s.lastSyncAt) : 'Configured, not yet synced.') : 'Not set up yet.') + '</p>';
  html += '</div>';

  html += '<div class="sb-sep"></div>';
  html += '<div class="sb-field"><label>Backup</label>';

  html += '<button type="button" class="sb-btn-secondary" id="exportMd">Export Markdown</button>';
  html += '<button type="button" class="sb-btn-secondary" id="exportIcs">Export .ics</button>';
  html += '<button type="button" class="sb-btn-secondary" id="importJson">Import JSON</button>';
  html += '</div><input type="file" id="importFileInput" accept="application/json" style="display:none;"></div>';

  html += '<div class="sb-field"><label>Bookmarklet</label>';
  html += '<p style="font-size:var(--fs-xs);color:var(--text-secondary);">Drag this link to your bookmarks bar. Clicking it on any page opens Second Brain with that page pre-filled.</p>';
  html += '<a href="#" id="bookmarkletLink" style="display:inline-block;background:var(--accent-soft);color:var(--accent);padding:8px 16px;border-radius:999px;font-size:var(--fs-xs);font-weight:700;text-decoration:none;">+ Add to Second Brain</a></div>';

  html += '<div class="sb-sep"></div>';
  html += '<button type="button" class="sb-btn-text sb-btn-danger-text" id="clearAllData">Clear all data…</button>';

  html += '<div class="sb-modal-foot"><button class="sb-btn-cta" id="settingsClose">Done</button></div>';

  var el = openModal(html, true);

  el.querySelector('#themeSelect').addEventListener('change', function(e){
    state.settings.theme = e.target.value;
    if(e.target.value === 'system') applySystemTheme();
    else document.documentElement.setAttribute('data-theme', e.target.value);
    saveState();
  });


  el.querySelector('#profileNameInput').addEventListener('change', function(e){
    state.settings.profileName = e.target.value.trim();
    saveState();
    renderTopHeader();
  });
  el.querySelector('#profileSubtitleInput').addEventListener('change', function(e){
    state.settings.profileSubtitle = e.target.value.trim();
    saveState();
    renderTopHeader();
  });

  el.querySelector('#geminiApiKey').addEventListener('change', function(e){
    state.settings.geminiApiKey = e.target.value.trim();
    saveState();
  });

  function connectSyncField(){
    var statusEl = el.querySelector('#syncStatus');
    if(hasRemoteSync()){
      if(statusEl) statusEl.textContent = 'Connecting…';
      pullRemoteState().then(function(){
        renderAll();
        openSettingsModal();
        showToast('Connected — pulled your existing data.');
      }).catch(function(err){
        if(statusEl) statusEl.textContent = 'Could not connect: ' + err.message + ' (settings saved locally; try "Sync now" again)';
        saveLocalSettingsOnly();
      });
    } else {
      saveState();
    }
  }
  el.querySelector('#syncApiKey').addEventListener('change', function(e){
    state.settings.syncApiKey = e.target.value.trim();

  });
  el.querySelector('#syncBinId').addEventListener('change', function(e){
    state.settings.syncBinId = e.target.value.trim();
    connectSyncField();
  });
  el.querySelector('#btnCreateSyncBin').addEventListener('click', function(){
    var key = el.querySelector('#syncApiKey').value.trim();
    if(!key){ showToast('Paste your JSONBin API key first.'); return; }
    state.settings.syncApiKey = key;
    var statusEl = el.querySelector('#syncStatus');
    statusEl.textContent = 'Creating sync bin…';
    var toSave = { folders: state.folders, trash: state.trash, settings: state.settings, digest: state.digest, taskSortOrder: state.taskSortOrder };
    remoteSyncCreateBin(toSave).then(function(binId){
      state.settings.syncBinId = binId;
      state.settings.lastSyncAt = Date.now();
      saveState();
      el.querySelector('#syncBinId').value = binId;

    }).catch(function(err){
      statusEl.textContent = 'Could not create sync bin: ' + err.message;
      showToast('Sync setup failed: ' + err.message);

  });
  el.querySelector('#btnSyncNow').addEventListener('click', function(){
    var statusEl = el.querySelector('#syncStatus');
    if(!hasRemoteSync()){ showToast('Set up your API key and Bin ID first.'); return; }
    statusEl.textContent = 'Syncing…';
    pullRemoteState().then(function(){
      renderAll();
      openSettingsModal();
      showToast('Synced with your other devices.');
    }).catch(function(err){
      statusEl.textContent = 'Sync failed: ' + err.message;

  });

  el.querySelector('#exportJson').addEventListener('click', exportJson);
  el.querySelector('#exportMd').addEventListener('click', exportMarkdown);
  el.querySelector('#exportIcs').addEventListener('click', exportIcs);
  el.querySelector('#importJson').addEventListener('click', function(){ el.querySelector('#importFileInput').click(); });
  el.querySelector('#importFileInput').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        openConfirmModal('Replace all data?', 'Importing will replace your current folders and trash with the contents of this file.', function(){
          state.folders = data.folders || defaultFolders();
          state.trash = data.trash || { notes:[], folders:[] };
          if(data.digest) state.digest = data.digest;
          invalidateNotesCache(); saveState(); renderAll(); closeModal();
          showToast('Data imported.');
        });
      }catch(err){ showToast('Invalid JSON file.'); }
    };
    reader.readAsText(file);
  });

  setupBookmarklet(el.querySelector('#bookmarkletLink'));

  el.querySelector('#clearAllData').addEventListener('click', function(){
    openConfirmModal('Clear all data?', 'This deletes every folder, note, and setting permanently. This cannot be undone.', function(){
      storageDelete(STORAGE_KEY).then(function(){
        state = defaultState();
        invalidateNotesCache();
        document.documentElement.setAttribute('data-theme','light');
        renderAll();
        closeModal();
      });
    });
  });

  el.querySelector('#settingsClose').addEventListener('click', closeModal);
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function downloadFile(filename, content, mime){
  var blob = new Blob([content], { type: mime });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  state.settings.lastExportAt = Date.now();
  saveState();
}

function exportJson(){
  var data = { folders: state.folders, trash: state.trash, digest: state.digest, exportedAt: Date.now() };
  downloadFile('second-brain-backup-' + todayISO() + '.json', JSON.stringify(data, null, 2), 'application/json');
  showToast('JSON backup downloaded.');
}

function exportMarkdown(){
  var lines = ['# Second Brain', ''];
  function walk(folders, depth){
    folders.forEach(function(f){
      lines.push('#'.repeat(Math.min(depth+2,6)) + ' ' + f.icon + ' ' + f.name);
      if(f.description) lines.push('_' + f.description + '_');
      lines.push('');
      f.notes.forEach(function(n){
        var prefix = folderIsTaskList(f) ? (n.done ? '- [x] ' : '- [ ] ') : '- ';
        var meta = [];
        if(n.dueDate) meta.push('due ' + n.dueDate);
        if(n.priority) meta.push(n.priority);
        lines.push(prefix + n.content + (meta.length ? ' (' + meta.join(', ') + ')' : ''));
        if(n.description) lines.push('  ' + n.description);
      });
      lines.push('');
      walk(f.subfolders, depth+1);
    });
  }
  walk(state.folders, 0);
  downloadFile('second-brain-' + todayISO() + '.md', lines.join('\n'), 'text/markdown');
  showToast('Markdown export downloaded.');
}

function icsEscape(s){ return String(s||'').replace(/([,;])/g,'\\$1').replace(/\n/g,'\\n'); }

function exportIcs(){
  var tasks = getAllTasks().filter(function(item){ return item.note.dueDate; });
  var lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Second Brain//EN'];
  tasks.forEach(function(item){
    var n = item.note;
    var dt = n.dueDate.replace(/-/g,'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + n.id + '@secondbrain');
    lines.push('DTSTAMP:' + new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z');
    lines.push('DTSTART;VALUE=DATE:' + dt);
    lines.push('SUMMARY:' + icsEscape(n.content));
    if(n.description) lines.push('DESCRIPTION:' + icsEscape(n.description));
    if(n.recurrence){
      var freq = n.recurrence === 'daily' ? 'DAILY' : n.recurrence === 'weekly' ? 'WEEKLY' : 'MONTHLY';
      lines.push('RRULE:FREQ=' + freq);
    }
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  downloadFile('second-brain-tasks-' + todayISO() + '.ics', lines.join('\r\n'), 'text/calendar');
  showToast('.ics calendar downloaded.');
}

function setupBookmarklet(linkEl){
  var origin = window.location.origin + window.location.pathname;
  var code = "javascript:(function(){var u=encodeURIComponent(location.href),t=encodeURIComponent(document.title);window.open('" + origin + "?url='+u+'&title='+t,'_blank');})();";
  linkEl.setAttribute('href', code);
}

function handleIncomingShare(){
  var params = new URLSearchParams(window.location.search);
  var url = params.get('url'), title = params.get('title'), text = params.get('text');
  if(url || text){
    captureDraft.linkMode = !!url;
    captureDraft.linkUrl = url || '';
    captureDraft.text = text || title || '';
    if(url){
      var fullUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;
      state.pendingLinkPreview = { url: fullUrl, title: title || 'Fetching preview…', thumbnail: null, favicon: null, author: '', loading: true };
      fetchLinkPreview(fullUrl).then(function(preview){
        state.pendingLinkPreview = preview || { url:fullUrl, title: title||fullUrl, thumbnail:null, favicon:null, author:'' };
        renderMain();
      });
    }
    history.replaceState(null, '', window.location.pathname);
  }
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
function openShortcutsModal(){
  var rows = [
    ['⌘/Ctrl + K','Focus capture box'],
    ['⌘/Ctrl + F','Focus search'],
    ['⌘/Ctrl + Enter','File the current capture'],
    ['Esc','Close dialogs'],
    ['?','Show this list']
  ];
  var html = '<h2>Keyboard shortcuts</h2>';
  rows.forEach(function(r){
    html += '<div class="sb-shortcut-row"><span class="sb-kbd">' + r[0] + '</span><span>' + r[1] + '</span></div>';
  });
  html += '<div class="sb-modal-foot"><button class="sb-btn-cta" id="shortcutsClose">Close</button></div>';
  var el = openModal(html);
  el.querySelector('#shortcutsClose').addEventListener('click', closeModal);
}

document.addEventListener('keydown', function(e){
  var tag = (document.activeElement && document.activeElement.tagName) || '';
  var typing = tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT';

  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k'){
    e.preventDefault();
    var cap = document.getElementById('captureInput');
    if(cap) cap.focus();
    return;
  }
  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'f'){
    e.preventDefault();
    var s = document.getElementById('searchInput');
    if(s) s.focus();
    return;
  }
  if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
    if(document.activeElement && document.activeElement.id === 'captureInput'){
      e.preventDefault();
      handleFileClick();
    }
    return;
  }
  if(e.key === 'Escape'){
    if(document.getElementById('activeModalBackdrop')){ closeModal(); return; }
    closeAllFloatingMenus();
    return;
  }
  if(e.key === '?' && !typing){
    e.preventDefault();
    openShortcutsModal();
  }
});

window.addEventListener('beforeunload', function(e){
  if(captureDraft.text && captureDraft.text.trim().length > 0){
    e.preventDefault();
    e.returnValue = '';
  }
});

if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener && window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(){
    if(state.settings.theme === 'system') applySystemTheme();
  });
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  loadState().then(function(){
    handleIncomingShare();
    renderAll();

    if(getAllNotesCached().length > 20 && !state.settings.lastExportAt){
      setTimeout(function(){
        showToast('You have a lot of notes and no backup yet — consider exporting from Settings.');
      }, 1500);
    }
  });
}

init();

})();
